<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZENTRA Signals</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050b14;
color:white;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

.nav a{
margin-left:15px;
color:#9fb4cc;
text-decoration:none;
}

.card{
background:#0d1b2a;
border:1px solid #1f3a56;
border-radius:12px;
padding:16px;
margin-bottom:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.metric{
background:#13263a;
padding:12px;
border-radius:8px;
}

.metric .value{
font-size:24px;
font-weight:bold;
}

.signal{
background:#13263a;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.signal-head{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.high{color:#ff6b6b}
.medium{color:#ffb347}
.low{color:#38d39f}

.footer{
text-align:right;
color:#9fb4cc;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="title">
ZENTRA Signals
</div>

<div class="nav">
<a href="/">Control Panel</a>
<a href="/risklens/economic-terminal.html">Terminal</a>
<a href="/economic-globe.html">Globe</a>
<a href="/risklens/dashboard.html">RiskLens</a>
</div>

</div>


<div class="card">

<h3>Signals Overview</h3>

<div class="grid">

<div class="metric">
Dominant Driver
<div class="value" id="driver"></div>
</div>

<div class="metric">
Signals Count
<div class="value" id="count"></div>
</div>

<div class="metric">
High Severity
<div class="value" id="highCount"></div>
</div>

<div class="metric">
System Status
<div class="value">Active</div>
</div>

</div>

</div>


<div class="card">

<h3>Signals Monitor</h3>

<div id="signals"></div>

</div>


<div class="card">

<h3>Markets Snapshot</h3>

<div class="grid">

<div class="metric">
Oil
<div class="value" id="oil"></div>
</div>

<div class="metric">
Gold
<div class="value" id="gold"></div>
</div>

<div class="metric">
S&P500
<div class="value" id="sp500"></div>
</div>

<div class="metric">
Interest
<div class="value" id="interest"></div>
</div>

</div>

</div>


<div class="footer">

ZENTRA Signals Intelligence Layer

</div>

</div>


<script>

const DATA={

dominantDriver:"Energy Pressure",

markets:{
oil:82.4,
gold:2180.5,
sp500:5120.3,
interestRate:4.75
},

signals:[
{title:"Energy Pressure",severity:"high",summary:"Energy prices rising globally"},
{title:"Logistics Stress",severity:"medium",summary:"Shipping disruptions increasing"},
{title:"Market Volatility",severity:"low",summary:"Market fluctuations moderate"},
{title:"Supply Chain Pressure",severity:"medium",summary:"Delays across logistics networks"}
]

}


function render(){

document.getElementById("driver").innerText=DATA.dominantDriver

document.getElementById("oil").innerText=DATA.markets.oil
document.getElementById("gold").innerText=DATA.markets.gold
document.getElementById("sp500").innerText=DATA.markets.sp500
document.getElementById("interest").innerText=DATA.markets.interestRate

document.getElementById("count").innerText=DATA.signals.length

let high=0

DATA.signals.forEach(s=>{
if(s.severity==="high")high++
})

document.getElementById("highCount").innerText=high

const box=document.getElementById("signals")

DATA.signals.forEach(s=>{

const div=document.createElement("div")

div.className="signal"

div.innerHTML=
"<div class='signal-head'><b>"+s.title+"</b><span class='"+s.severity+"'>"+s.severity+"</span></div>"+
"<div>"+s.summary+"</div>"

box.appendChild(div)

})

}

render()

</script>

</body>
</html>
