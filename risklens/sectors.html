<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RiskLens Sector Pressure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#030712;
  color:#eef6ff;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  background:#081120;
  border-bottom:1px solid #163052;
}
.brand{color:#00d4ff;font-size:22px;font-weight:bold}
.menu a{
  color:#dcecff;
  text-decoration:none;
  margin-left:18px;
  font-size:14px;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 20px 60px;
}
.hero h1{
  color:#00d4ff;
  font-size:38px;
  margin-bottom:10px;
}
.hero p{
  color:#9bb3d9;
  line-height:1.8;
}
.panel{
  margin-top:24px;
  background:#081120;
  border:1px solid #163052;
  border-radius:16px;
  padding:22px;
}
.item{
  margin-bottom:18px;
}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
.row strong{color:#eef6ff}
.row span{color:#9bb3d9}
.bar{
  height:10px;
  background:#0c1830;
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  border-radius:999px;
}
.red{background:#ff4d6d}
.orange{background:#ff8a3d}
.yellow{background:#f5b942}
.green{background:#19e68c}
@media(max-width:700px){.menu{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">RiskLens</div>
  <div class="menu">
    <a href="dashboard.html">Dashboard</a>
    <a href="advisor.html">Economic AI</a>
    <a href="worldmap.html">Global Map</a>
    <a href="sectors.html">Sectors</a>
    <a href="crisis.html">Crisis</a>
    <a href="signals.html">Signals</a>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h1>Sector Pressure</h1>
    <p>RiskLens compares sector fragility under inflation, rates, financing conditions and demand weakness.</p>
  </div>

  <div class="panel">
    <div class="item">
      <div class="row"><strong>Construction</strong><span>78 / 100</span></div>
      <div class="bar"><div class="fill red" style="width:78%"></div></div>
    </div>
    <div class="item">
      <div class="row"><strong>Retail</strong><span>66 / 100</span></div>
      <div class="bar"><div class="fill orange" style="width:66%"></div></div>
    </div>
    <div class="item">
      <div class="row"><strong>Manufacturing</strong><span>61 / 100</span></div>
      <div class="bar"><div class="fill orange" style="width:61%"></div></div>
    </div>
    <div class="item">
      <div class="row"><strong>Energy</strong><span>54 / 100</span></div>
      <div class="bar"><div class="fill yellow" style="width:54%"></div></div>
    </div>
    <div class="item">
      <div class="row"><strong>Technology</strong><span>38 / 100</span></div>
      <div class="bar"><div class="fill green" style="width:38%"></div></div>
    </div>
  </div>
</div>

</body>
</html>
