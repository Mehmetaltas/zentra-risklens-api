<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ZENTRA Economic OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

<style>

/* =========================
GLOBAL
========================= */

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
overflow-x:hidden;
}

/* =========================
NAV
========================= */

nav{
background:#08132a;
padding:16px;
display:flex;
justify-content:space-between;
}

nav a{
color:#7bdfff;
text-decoration:none;
margin-left:15px;
}

/* =========================
HERO
========================= */

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:44px;
color:#00e0ff;
}

/* =========================
GRID
========================= */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* =========================
CARDS
========================= */

.card{
background:#0e1c38;
padding:20px;
border-radius:12px;
}

/* =========================
METRICS
========================= */

.metric{
font-size:28px;
color:#00e0ff;
}

/* =========================
MAP
========================= */

.map-container{
width:100%;
max-width:900px;
margin:auto;
background:#050d1a;
border-radius:16px;
padding:10px;
}

#worldMap{
width:100%!important;
height:500px!important;
}

.country-panel{
margin-top:20px;
background:#08132a;
padding:20px;
border-radius:12px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.risk-box{
font-size:20px;
color:#00e0ff;
margin-top:10px;
}

/* =========================
AI CHAT
========================= */

.chat-box{
background:#020814;
padding:15px;
height:200px;
overflow:auto;
border-radius:10px;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#08132a;
color:white;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
background:#00e0ff;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>

<div>ZENTRA</div>

<div>
<a href="#dashboard">Dashboard</a>
<a href="#map">Risk Map</a>
<a href="#ai">AI</a>
</div>

</nav>

<section class="hero">

<h1>ZENTRA Economic Operating System</h1>
<p>Global Economic Intelligence Platform</p>

</section>

<section id="dashboard" style="max-width:1200px;margin:auto;padding:30px">

<div class="grid">

<div class="card">
<div>Global Risk</div>
<div id="riskScore" class="metric"></div>
</div>

<div class="card">
<div>State</div>
<div id="state" class="metric"></div>
</div>

<div class="card">
<div>Trend</div>
<div id="trend" class="metric"></div>
</div>

</div>

</section>

<section id="map">

<h2 style="text-align:center">Global Risk Map</h2>

<div class="map-container">
<canvas id="worldMap"></canvas>
</div>

<div class="country-panel">

<h3 id="countryName">Select Country</h3>

<div class="risk-box">
Risk Score: <span id="countryRisk">--</span>
</div>

<div id="countryInfo">
Click a country to see risk information
</div>

</div>

</section>

<section id="ai" style="max-width:800px;margin:auto;padding:30px">

<h2>ZENTRA AI</h2>

<div id="chatBox" class="chat-box">
<div><b>ZENTRA:</b> Ask about economy or business</div>
</div>

<textarea id="chatInput"></textarea>

<button onclick="ask()">Send</button>

</section>

<script>

/* =========================
DASHBOARD
========================= */

function randomRisk(){

return Math.floor(Math.random()*100)

}

let risk=randomRisk()

document.getElementById("riskScore").innerText=risk

let state="Stable"

if(risk>70) state="High Risk"

document.getElementById("state").innerText=state

document.getElementById("trend").innerText="Neutral"

/* =========================
GLOBAL MAP ENGINE
========================= */

async function loadRiskMap(){

const world = await fetch(
"https://unpkg.com/world-atlas@2/countries-110m.json"
).then(res => res.json())

const countries =
ChartGeo.topojson.feature(world, world.objects.countries).features

const data = countries.map(d => ({
feature:d,
value:Math.floor(Math.random()*100)
}))

const ctx=document.getElementById("worldMap")

new Chart(ctx,{

type:"choropleth",

data:{
labels:countries.map(d=>d.properties.name),

datasets:[{
label:"Risk Index",
data:data
}]
},

options:{

plugins:{legend:{display:false}},

scales:{
projection:{axis:"x",projection:"equalEarth"},
color:{axis:"x",quantize:5}
},

onClick:(event,elements)=>{

if(elements.length>0){

const index=elements[0].index

const country=data[index]

document.getElementById("countryName")
.innerText=country.feature.properties.name

document.getElementById("countryRisk")
.innerText=country.value

document.getElementById("countryInfo")
.innerText="Economic risk evaluation for "
+country.feature.properties.name

}

}

}

})

}

loadRiskMap()

/* =========================
AI CHAT
========================= */

function ask(){

let q=document.getElementById("chatInput").value

let box=document.getElementById("chatBox")

box.innerHTML+=`<div><b>You:</b> ${q}</div>`

box.innerHTML+=`<div><b>ZENTRA:</b> Economic indicators suggest monitoring inflation and energy.</div>`

}

</script>

</body>
</html>
