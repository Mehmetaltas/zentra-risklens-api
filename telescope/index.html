<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ZENTRA Global Telescope</title><style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

h1{
margin-bottom:30px;
}

.market-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:15px;
}

.market{
background:#0f172a;
padding:15px;
border-radius:8px;
text-align:center;
}

.market span{
display:block;
font-size:22px;
margin-top:5px;
}

.signal{
background:#0f172a;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.signal.high{
border-left:5px solid #ef4444;
}

.signal.medium{
border-left:5px solid #f59e0b;
}

</style></head><body><div class="container"><h1>ZENTRA Global Economic Telescope</h1><div class="card">
<h2>Global Risk</h2>
<div id="riskScore">loading...</div>
<div id="driver"></div>
</div><div class="card">
<h2>Markets</h2><div class="market-grid"><div class="market">
Oil
<span id="oil"></span>
</div><div class="market">
Gold
<span id="gold"></span>
</div><div class="market">
S&P500
<span id="sp"></span>
</div><div class="market">
Interest Rate
<span id="rate"></span>
</div></div></div><div class="card">
<h2>Active Risk Signals</h2>
<div id="signals"></div>
</div></div><script>

const data = {

globalRisk: 99,

dominantDriver: "Energy Shock",

signals: [
{ name:"Oil Price Surge", severity:"high", sector:"energy"},
{ name:"Shipping Congestion", severity:"high", sector:"logistics"},
{ name:"Cyber Pressure", severity:"medium", sector:"banking"},
{ name:"Port Stress", severity:"medium", sector:"trade"}
],

markets:{
oil:82,
gold:2310,
sp500:5180,
interestRate:4.8
}

}

function computeRisk(data){

let score = 0

if(data.markets.oil > 80) score += 30
if(data.markets.interestRate > 4.5) score += 20

data.signals.forEach(s=>{
if(s.severity==="high") score += 15
if(s.severity==="medium") score += 8
})

return score

}

function render(){

document.getElementById("riskScore").innerText =
"Risk Score: "+computeRisk(data)

document.getElementById("driver").innerText =
"Driver: "+data.dominantDriver

document.getElementById("oil").innerText = data.markets.oil
document.getElementById("gold").innerText = data.markets.gold
document.getElementById("sp").innerText = data.markets.sp500
document.getElementById("rate").innerText = data.markets.interestRate

const signalsHTML = data.signals.map(s=>`
<div class="signal ${s.severity}">
<strong>${s.name}</strong><br>
Sector: ${s.sector}
</div>
`).join("")

document.getElementById("signals").innerHTML = signalsHTML

}

render()

</script>
<script src="/assets/js/auth-guard.js"></script>
</body>
</html>
