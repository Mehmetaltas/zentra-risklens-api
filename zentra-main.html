<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Main System</title><style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#08101d;
  color:#ecf3ff;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:24px;
}
.card{
  background:#0f1728;
  border:1px solid #1f2d48;
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}
h1,h2,h3{margin:0 0 10px}
.muted{color:#9db0d1}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.mini{
  background:#111c31;
  border:1px solid #1f2d48;
  border-radius:12px;
  padding:14px;
}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style></head><body><div class="wrap">  <div class="card">
    <h1>ZENTRA Main System</h1>
    <p class="muted">Core protected unified screen</p>
  </div>  <div class="grid"><div class="card">
  <h2>Global Snapshot</h2>
  <div id="snapshot">Loading...</div>
</div>

<div class="card">
  <h2>AI Decision Panel</h2>
  <div id="aiPanel">Loading AI...</div>
</div>

  </div></div><script type="module">
import { runZentraFlow } from "./core-system/systemOrchestrator.js?v=5";

const snapshot = document.getElementById("snapshot");
const panel = document.getElementById("aiPanel");

function render() {
  try {
    const result = runZentraFlow();

    // SNAPSHOT
    snapshot.innerHTML = `
      <div class="mini">
        Risk Score: <b>${result.security.score}</b><br>
        Driver: <b>${result.data.demand}</b><br>
        Profit: <b>${result.trade.profit}</b>
      </div>
    `;

    // AI
    const ai = result.aiDecision;
    const pred = result.predictiveTrade;
    const risk = result.riskForecast;

    const color =
      ai.recommendation === "EXECUTE" ? "#22c55e" :
      ai.recommendation === "REVIEW" ? "#f59e0b" :
      "#ef4444";

    panel.innerHTML = `
      <div class="mini">
        <h3 style="color:${color}">${ai.recommendation}</h3>
        Score: <b>${ai.aiDecisionScore}</b><br>
        Confidence: <b>${ai.confidence}</b>
      </div>

      <div class="mini">
        <h3>Predictive</h3>
        Trend: <b>${pred.nextTrend}</b><br>
        Signal: <b>${pred.predictiveSignal}</b><br>
        Profit: <b>${pred.projectedProfit}</b>
      </div>

      <div class="mini">
        <h3>Risk</h3>
        Level: <b>${risk.riskForecastLevel}</b><br>
        Score: <b>${risk.riskForecastScore}</b><br>
        <div class="muted" style="margin-top:6px">
          ${risk.forecastDrivers.join("<br>")}
        </div>
      </div>
    `;
  } catch (e) {
    console.error(e);
    panel.innerHTML = "AI Error";
  }
}

render();
</script></body>
</html>
