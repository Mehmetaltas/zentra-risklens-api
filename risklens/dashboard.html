<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZENTRA RiskLens</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050b14;
color:white;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

.nav a{
margin-left:15px;
color:#9fb4cc;
text-decoration:none;
}

.card{
background:#0d1b2a;
border:1px solid #1f3a56;
border-radius:12px;
padding:16px;
margin-bottom:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.metric{
background:#13263a;
padding:12px;
border-radius:8px;
}

.metric .value{
font-size:26px;
font-weight:bold;
}

.signal{
background:#13263a;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.high{color:#ff6b6b}
.medium{color:#ffb347}
.low{color:#38d39f}

.panel{
display:grid;
grid-template-columns:2fr 1fr;
gap:12px;
}

.advisory{
color:#9fb4cc;
line-height:1.5;
}

.footer{
text-align:right;
color:#9fb4cc;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="title">
ZENTRA RiskLens
</div>

<div class="nav">
<a href="/">Control Panel</a>
<a href="/risklens/economic-terminal.html">Terminal</a>
<a href="/economic-globe.html">Globe</a>
</div>

</div>


<div class="card">

<h3>Risk Overview</h3>

<div class="grid">

<div class="metric">
Risk Score
<div class="value" id="riskScore"></div>
</div>

<div class="metric">
Risk Level
<div class="value" id="riskLevel"></div>
</div>

<div class="metric">
Dominant Driver
<div class="value" id="driver"></div>
</div>

<div class="metric">
System Status
<div class="value">Operational</div>
</div>

</div>

</div>


<div class="panel">

<div>

<div class="card">

<h3>Signals Monitor</h3>

<div id="signals"></div>

</div>

</div>


<div>

<div class="card">

<h3>Risk Advisory</h3>

<div class="advisory" id="advice"></div>

</div>

</div>

</div>


<div class="card">

<h3>Markets</h3>

<div class="grid">

<div class="metric">
Oil
<div class="value" id="oil"></div>
</div>

<div class="metric">
Gold
<div class="value" id="gold"></div>
</div>

<div class="metric">
S&P500
<div class="value" id="sp500"></div>
</div>

<div class="metric">
Interest
<div class="value" id="interest"></div>
</div>

</div>

</div>


<div class="footer">
ZENTRA Risk Intelligence Layer
</div>

</div>



<script>

const DATA={

dominantDriver:"Energy Pressure",

markets:{
oil:82.4,
gold:2180.5,
sp500:5120.3,
interestRate:4.75
},

signals:[
{title:"Energy Pressure",severity:"high",summary:"Energy markets tightening"},
{title:"Logistics Stress",severity:"medium",summary:"Shipping disruptions"},
{title:"Market Volatility",severity:"low",summary:"Volatility moderate"}
]

}


function computeSignals(data){

let score=0

if(data.markets.oil>80)score+=30
if(data.markets.interestRate>4.5)score+=20

data.signals.forEach(s=>{
if(s.severity==="high")score+=15
if(s.severity==="medium")score+=8
if(s.severity==="low")score+=3
})

if(score>100)score=100

let level="LOW"
if(score>=70)level="HIGH"
else if(score>=40)level="MEDIUM"

return{score,level}

}


function render(){

const result=computeSignals(DATA)

document.getElementById("riskScore").innerText=result.score
document.getElementById("riskLevel").innerText=result.level
document.getElementById("driver").innerText=DATA.dominantDriver

document.getElementById("oil").innerText=DATA.markets.oil
document.getElementById("gold").innerText=DATA.markets.gold
document.getElementById("sp500").innerText=DATA.markets.sp500
document.getElementById("interest").innerText=DATA.markets.interestRate

const box=document.getElementById("signals")

DATA.signals.forEach(s=>{

const div=document.createElement("div")
div.className="signal"

div.innerHTML="<b>"+s.title+"</b> <span class='"+s.severity+"'>"+s.severity+"</span><div>"+s.summary+"</div>"

box.appendChild(div)

})

document.getElementById("advice").innerText="Monitor energy prices and logistics networks."

}

render()

</script>

</body>
</html>
