<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ZENTRA Economic OS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
}

nav{
background:#08132a;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #103865;
}

.logo{
font-weight:bold;
color:#00e0ff;
}

nav a{
color:#7bdfff;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:60px;
color:#00e0ff;
margin-bottom:20px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:20px;
color:#9dcdf3;
}

.section{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.card{
background:#0e1c38;
padding:25px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #103865;
}

.metric{
font-size:30px;
color:#00e0ff;
}

textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#08132a;
color:white;
}

button{
margin-top:10px;
padding:12px 20px;
background:#00e0ff;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
background:#020814;
padding:20px;
margin-top:10px;
border-radius:10px;
}

footer{
text-align:center;
padding:40px;
background:#08132a;
color:#6fa9d6;
}

</style>

</head>

<body>

<nav>

<div class="logo">ZENTRA</div>

<div>

<a href="#dashboard">Dashboard</a>
<a href="#brain">Brain</a>
<a href="#chat">AI</a>
<a href="#business">Business</a>
<a href="#trade">Trade</a>
<a href="#crisis">Crisis</a>

</div>

</nav>

<section class="hero">

<h1>ZENTRA Economic OS</h1>

<p>

Global economic intelligence platform combining
AI, macro analysis and financial risk systems.

</p>

</section>

<section id="dashboard" class="section">

<h2>Global Dashboard</h2>

<div class="card">

<div class="metric" id="riskScore">Loading...</div>

<div id="state"></div>

</div>

</section>

<section id="brain" class="section">

<h2>Economic Brain</h2>

<div class="card">

<div id="brainResult"></div>

</div>

</section>

<section id="chat" class="section">

<h2>AI Advisor</h2>

<div class="card">

<textarea id="chatInput" placeholder="Ask economic question"></textarea>

<button onclick="ask()">Ask</button>

<div id="chatResult" class="result"></div>

</div>

</section>

<section id="business" class="section">

<h2>Business Simulator</h2>

<div class="card">

<input id="cost" placeholder="Cost">

<input id="revenue" placeholder="Revenue">

<button onclick="business()">Simulate</button>

<div id="businessResult" class="result"></div>

</div>

</section>

<section id="trade" class="section">

<h2>Trade Intelligence</h2>

<div class="card">

<input id="qty" placeholder="Quantity">

<input id="unitCost" placeholder="Unit Cost">

<input id="unitPrice" placeholder="Unit Price">

<input id="distance" placeholder="Distance">

<button onclick="trade()">Calculate</button>

<div id="tradeResult" class="result"></div>

</div>

</section>

<section id="crisis" class="section">

<h2>Crisis Radar</h2>

<div class="card">

<div id="crisisResult"></div>

</div>

</section>

<footer>

ZENTRA Economic OS

</footer>

<script>

const API="https://zentra-core-api.onrender.com"

async function loadDashboard(){

let r=await fetch(API+"/brain")

let data=await r.json()

document.getElementById("riskScore").innerText="Risk Index: "+data.global_risk_index

document.getElementById("state").innerText="State: "+data.economic_state

document.getElementById("brainResult").innerText=data.advice

}

async function ask(){

let q=document.getElementById("chatInput").value

let r=await fetch(API+"/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({question:q})

})

let data=await r.json()

document.getElementById("chatResult").innerText=data.answer

}

async function business(){

let cost=parseFloat(document.getElementById("cost").value)

let revenue=parseFloat(document.getElementById("revenue").value)

let r=await fetch(API+"/business",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({cost:cost,revenue:revenue})

})

let data=await r.json()

document.getElementById("businessResult").innerText=

"Profit: "+data.profit+" Margin:"+data.margin+"%"

}

async function trade(){

let q=parseFloat(document.getElementById("qty").value)

let c=parseFloat(document.getElementById("unitCost").value)

let p=parseFloat(document.getElementById("unitPrice").value)

let d=parseFloat(document.getElementById("distance").value)

let r=await fetch(API+"/trade",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

quantity:q,
unit_cost:c,
unit_price:p,
distance:d

})

})

let data=await r.json()

document.getElementById("tradeResult").innerText=

"Profit:"+data.profit+" Margin:"+data.margin+"%"

}

async function crisis(){

let r=await fetch(API+"/crisis-radar")

let data=await r.json()

document.getElementById("crisisResult").innerText=

"Score:"+data.crisis_score+" Signal:"+data.signal

}

loadDashboard()
crisis()

</script>

</body>

  </html>
