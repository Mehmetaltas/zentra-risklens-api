<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZENTRA Global Risk Map</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.6/build/index.umd.min.js"></script>

  <style>
    body{
      margin:0;
      background:#050814;
      color:#eaf2ff;
      font-family:Arial, Helvetica, sans-serif;
    }
    nav{
      background:#060b1c;
      padding:14px;
      border-bottom:1px solid #1e2a55;
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }
    nav a{
      color:white;
      text-decoration:none;
      font-size:14px;
    }
    .container{
      max-width:1200px;
      margin:auto;
      padding:30px 16px 40px;
    }
    .card{
      background:#0c1228;
      border:1px solid #1e2a55;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
    }
    h1{ color:#00d4ff; margin-top:0; }
    h2{ color:#19e68c; }
    .muted{ color:#9eb3d9; line-height:1.6; }
    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }
    .col-8{ grid-column:span 8; }
    .col-4{ grid-column:span 4; }
    .metric{
      font-size:30px;
      color:#00d4ff;
      margin-top:8px;
      font-weight:700;
    }
    .label{
      color:#8ea7d8;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:0.04em;
      margin-bottom:8px;
    }
    .info-box{
      background:#07101f;
      border:1px solid #1e2a55;
      border-radius:10px;
      padding:14px;
      line-height:1.7;
      min-height:140px;
      white-space:pre-wrap;
    }
    .status{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#162445;
      color:#d7e5ff;
      font-size:12px;
      margin-top:10px;
    }
    canvas{
      width:100% !important;
      height:560px !important;
    }
    .band{
      display:inline-block;
      margin-top:10px;
      padding:7px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
    }
    .very-low, .low{
      color:#19e68c;
      background:rgba(25,230,140,0.12);
      border:1px solid rgba(25,230,140,0.35);
    }
    .medium{
      color:#f5b942;
      background:rgba(245,185,66,0.12);
      border:1px solid rgba(245,185,66,0.35);
    }
    .high{
      color:#ff8a3d;
      background:rgba(255,138,61,0.12);
      border:1px solid rgba(255,138,61,0.35);
    }
    .critical{
      color:#ff4d6d;
      background:rgba(255,77,109,0.12);
      border:1px solid rgba(255,77,109,0.35);
    }
    @media (max-width:900px){
      .col-8,.col-4{ grid-column:span 12; }
      canvas{ height:420px !important; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="platform.html">Platform</a>
  <a href="architecture.html">Architecture</a>
  <a href="telescope.html">Telescope</a>
  <a href="marketplace.html">Lens</a>
  <a href="advisor.html">Advisor</a>
  <a href="investor.html">Investor</a>
  <a href="global-map.html">World Map</a>
</nav>

<div class="container">

  <div class="card">
    <h1>ZENTRA Global Risk Map</h1>
    <div class="muted">
      Country-level financial risk observation across the global economic system.
    </div>
    <div class="status" id="mapStatus">Harita yükleniyor...</div>
  </div>

  <div class="grid">
    <div class="card col-8">
      <h2>World Risk Map</h2>
      <canvas id="worldMap"></canvas>
    </div>

    <div class="card col-4">
      <div class="label">Selected Country</div>
      <div id="countryName" class="metric">None</div>

      <div class="label" style="margin-top:18px;">Risk Score</div>
      <div id="countryRisk" class="metric">--</div>

      <div id="countryBand" class="band medium">No data</div>

      <div class="label" style="margin-top:18px;">Details</div>
      <div class="info-box" id="countryInfo">Harita yükleniyor...</div>
    </div>
  </div>

</div>

<script>
  const API_URL = "https://zentra-core-api.onrender.com/global-risk";
  let chartInstance = null;

  function getBand(score){
    if(score >= 80) return "critical";
    if(score >= 65) return "high";
    if(score >= 45) return "medium";
    if(score >= 25) return "low";
    return "very low";
  }

  function setBandClass(el, band){
    el.className = "band " + band;
  }

  function setCountryPanel(name, risk){
    document.getElementById("countryName").innerText = name || "Unknown";
    document.getElementById("countryRisk").innerText = risk ?? "--";

    const band = typeof risk === "number" ? getBand(risk) : "medium";
    const bandEl = document.getElementById("countryBand");
    setBandClass(bandEl, band);
    bandEl.innerText = typeof risk === "number" ? band.toUpperCase() : "NO DATA";

    document.getElementById("countryInfo").innerText =
      typeof risk === "number"
        ? `Risk level for ${name}: ${risk}\nStatus: ${band}\nZENTRA interprets this as a country-level financial pressure signal.`
        : "Bu ülke için risk verisi bulunamadı.";
  }

  async function loadMap(){
    try{
      const [worldRes, riskRes] = await Promise.all([
        fetch("https://unpkg.com/world-atlas@2/countries-110m.json", { cache: "no-store" }),
        fetch(API_URL, { cache: "no-store" })
      ]);

      if(!worldRes.ok) throw new Error("World map HTTP " + worldRes.status);
      if(!riskRes.ok) throw new Error("API HTTP " + riskRes.status);

      const world = await worldRes.json();
      const riskJson = await riskRes.json();

      const countries = ChartGeo.topojson.feature(world, world.objects.countries).features;

      const riskMap = {};
      (riskJson.countries || []).forEach(c => {
        riskMap[c.name] = c.risk;
      });

      const aliases = {
        "United States of America": "United States",
        "Russian Federation": "Russia",
        "United Republic of Tanzania": "Tanzania",
        "Dem. Rep. Congo": "Congo",
        "Dominican Rep.": "Dominican Republic",
        "Central African Rep.": "Central African Republic",
        "Eq. Guinea": "Equatorial Guinea",
        "eSwatini": "Eswatini",
        "Bosnia and Herz.": "Bosnia and Herzegovina",
        "S. Sudan": "South Sudan"
      };

      const data = countries.map(feature => {
        const mapName = feature.properties.name;
        const apiName = aliases[mapName] || mapName;
        const value = riskMap[apiName] ?? null;
        return { feature, value, apiName };
      });

      const ctx = document.getElementById("worldMap").getContext("2d");
      if(chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: "choropleth",
        data: {
          labels: countries.map(d => d.properties.name),
          datasets: [{
            label: "Country Risk",
            data: data
          }]
        },
        options: {
          showOutline: true,
          showGraticule: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (context) => {
                  const item = context.raw;
                  const name = item.apiName || item.feature.properties.name;
                  const value = item.value;
                  return `${name}: ${value ?? "No data"}`;
                }
              }
            }
          },
          scales: {
            projection: {
              axis: "x",
              projection: "equalEarth"
            },
            color: {
              axis: "x",
              quantize: 5,
              legend: {
                position: "bottom-right"
              }
            }
          },
          onClick: (_, elements) => {
            if(!elements.length) return;
            const idx = elements[0].index;
            const item = data[idx];
            setCountryPanel(item.apiName || item.feature.properties.name, item.value);
          }
        }
      });

      setCountryPanel("Turkey", riskMap["Turkey"] ?? null);
      document.getElementById("mapStatus").innerText = "Harita yüklendi";

    } catch(e){
      document.getElementById("mapStatus").innerText = "Harita hatası";
      document.getElementById("countryInfo").innerText =
        "Harita veya API yüklenemedi: " + e.message;
    }
  }

  loadMap();
</script>

</body>
</html>
