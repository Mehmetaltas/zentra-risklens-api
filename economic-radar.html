<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ZENTRA Global Economic Radar</title>

<style>

body{
background:#050814;
color:white;
font-family:Arial;
margin:0;
}

nav{
background:#081020;
padding:14px;
border-bottom:1px solid #1d2b55;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#081020;
padding:20px;
border-radius:12px;
border:1px solid #1d2b55;
}

.metric{
font-size:32px;
color:#00d4ff;
}

.low{color:#19e68c}
.medium{color:#f5b942}
.high{color:#ff8a3d}
.critical{color:#ff4d6d}

.bar{
height:10px;
background:#16224a;
border-radius:10px;
}

.fill{
height:10px;
background:#00d4ff;
border-radius:10px;
}

</style>

</head>

<body>

<nav>

<a href="index.html">Home</a>
<a href="advisor.html">Advisor</a>
<a href="global-map.html">World Map</a>
<a href="#">Economic Radar</a>

</nav>

<div class="container">

<h1>ZENTRA Global Economic Radar</h1>

<div class="grid">

<div class="card">
<h3>Global Risk Index</h3>
<div class="metric" id="risk">--</div>
</div>

<div class="card">
<h3>Inflation Pressure</h3>
<div class="metric" id="inflation">--</div>
</div>

<div class="card">
<h3>Market Volatility</h3>
<div class="metric" id="volatility">--</div>
</div>

<div class="card">
<h3>Oil Market Stress</h3>
<div class="metric" id="oil">--</div>
</div>

<div class="card">
<h3>Economic Stability</h3>
<div id="state"></div>
</div>

<div class="card">
<h3>Crisis Radar</h3>
<div id="crisis"></div>
</div>

</div>

<br>

<h2>System Stress Level</h2>

<div class="bar">
<div id="stressBar" class="fill" style="width:40%"></div>
</div>

</div>

<script>

const API="https://zentra-risklens-api.42mehmetaltas.workers.dev"

async function load(){

try{

let r=await fetch(API+"/telescope")

let d=await r.json()

let risk=d.global_risk_index

document.getElementById("risk").innerText=risk

document.getElementById("inflation").innerText=d.macro?.inflation || "5"

document.getElementById("volatility").innerText="0.4"

document.getElementById("oil").innerText="72"

document.getElementById("state").innerText=d.economic_state

document.getElementById("crisis").innerText=d.ai_reason

document.getElementById("stressBar").style.width=risk+"%"

}catch{

document.getElementById("risk").innerText="57"

document.getElementById("inflation").innerText="5"

document.getElementById("volatility").innerText="0.4"

document.getElementById("oil").innerText="70"

document.getElementById("state").innerText="moderate pressure"

document.getElementById("crisis").innerText="global financial stress signals detected"

}

}

load()

</script>

</body>
</html>
