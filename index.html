<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA — Economic Intelligence Operating System</title>
  <meta
    name="description"
    content="ZENTRA is a global economic intelligence operating system for risk analysis, finance intelligence, simulation and trade opportunity detection."
  />
  <meta
    name="keywords"
    content="economic intelligence, global risk analysis, finance intelligence, trade intelligence, simulation, AI platform, telescope, risklens"
  />
  <meta name="theme-color" content="#07101d" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:#07101d;
      --bg2:#0b1324;
      --panel:#101a2d;
      --panel2:#16233b;
      --line:#24395f;
      --text:#eef5ff;
      --muted:#9fb3d2;
      --cyan:#63b3ff;
      --cyan2:#8fd7ff;
      --green:#45d483;
      --orange:#ff9d57;
      --red:#ff5c70;
      --shadow:0 18px 48px rgba(0,0,0,.28);
      --radius:22px;
      --max:1320px;
    }

    html { scroll-behavior: smooth; }

    body{
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(99,179,255,.12), transparent 20%),
        radial-gradient(circle at 85% 10%, rgba(69,212,131,.08), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(255,157,87,.06), transparent 18%),
        linear-gradient(180deg, #07101d 0%, #0a1323 55%, #07101d 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(6, 13, 28, .82);
      border-bottom: 1px solid rgba(143,215,255,.12);
    }

    .topbar-inner{
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid rgba(143,215,255,.22);
      background:
        radial-gradient(circle at 35% 35%, rgba(143,215,255,.35), transparent 40%),
        linear-gradient(180deg,#0f1c31,#132443);
      box-shadow: 0 0 28px rgba(99,179,255,.12);
      animation: pulseGlow 4s ease-in-out infinite;
    }

    .brand-title{
      color: var(--cyan2);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .6px;
      line-height: 1.1;
    }

    .brand-sub{
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }

    .top-btn,
    .lang{
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.03);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    .top-btn:hover,
    .lang:hover,
    .burger:hover{
      border-color: rgba(143,215,255,.35);
      transform: translateY(-1px);
    }

    .top-btn.ai-btn{
      background: linear-gradient(90deg, rgba(99,179,255,.18), rgba(69,212,131,.10));
      color: var(--cyan2);
    }

    .burger{
      width:48px;
      height:48px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:5px;
      cursor:pointer;
      background:#0d1626;
      transition:.2s ease;
      flex-shrink:0;
    }

    .burger span{
      width:22px;
      height:2px;
      background:#fff;
      display:block;
      border-radius:2px;
    }

    .drawer{
      position: fixed;
      top: 0;
      right: -390px;
      width: 370px;
      max-width: 92vw;
      height: 100vh;
      background:
        linear-gradient(180deg, rgba(9,17,31,.98), rgba(12,22,39,.98));
      border-left: 1px solid rgba(143,215,255,.14);
      box-shadow: -20px 0 60px rgba(0,0,0,.35);
      padding: 20px;
      transition: right .28s ease;
      z-index: 1200;
      overflow-y: auto;
    }

    .drawer.open { right: 0; }

    .drawer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .drawer-title{
      color: var(--cyan2);
      font-size: 20px;
      font-weight: 700;
    }

    .drawer-close{
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background:#0d1626;
      color:#fff;
      cursor:pointer;
      font-size:18px;
    }

    .searchBox{
      width:100%;
      padding:13px 14px;
      margin-bottom:16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:#081020;
      color:white;
      outline:none;
    }

    .nav-group{
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.03);
      border-radius: 16px;
      overflow: hidden;
    }

    .nav-group-title{
      padding: 14px 16px;
      color: var(--cyan2);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.02);
    }

    .nav-link{
      display:block;
      padding: 14px 16px;
      color:#fff;
      border-top: 1px solid rgba(255,255,255,.04);
      transition:.18s ease;
    }

    .nav-link:hover{
      background:#14233d;
      color: var(--cyan2);
    }

    .nav-link small{
      display:block;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.45;
      font-size: 12px;
    }

    .page-shell{
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 18px 48px;
    }

    .hero{
      position: relative;
      padding: 34px 0 18px;
    }

    .hero-shell{
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(143,215,255,.12);
      border-radius: 28px;
      background:
        radial-gradient(circle at 18% 25%, rgba(99,179,255,.16), transparent 26%),
        radial-gradient(circle at 80% 18%, rgba(69,212,131,.10), transparent 18%),
        linear-gradient(180deg, rgba(16,26,45,.98), rgba(10,19,35,.98));
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
      align-items: center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: var(--cyan2);
      font-size: 12px;
      margin-bottom: 16px;
      animation: slideInUp .7s ease;
    }

    .hero h1{
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.06;
      letter-spacing: -.8px;
      margin-bottom: 16px;
      animation: slideInUp .8s ease;
    }

    .hero p{
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
      max-width: 760px;
      animation: slideInUp .95s ease;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top: 24px;
      animation: slideInUp 1.05s ease;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.08);
      transition:.2s ease;
      cursor:pointer;
    }

    .btn-primary{
      background: linear-gradient(90deg, var(--cyan), var(--green));
      color: #07101d;
      border: none;
      box-shadow: 0 10px 26px rgba(69,212,131,.18);
    }

    .btn-secondary{
      background: rgba(255,255,255,.03);
      color: #fff;
    }

    .btn:hover{
      transform: translateY(-2px);
    }

    .hero-side{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .floating-card{
      border:1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      border-radius: 20px;
      padding: 18px;
      min-height: 120px;
      animation: floatY 5s ease-in-out infinite;
    }

    .floating-card:nth-child(2){ animation-delay: .6s; }
    .floating-card:nth-child(3){ animation-delay: 1.1s; }

    .floating-card h3{
      color: var(--cyan2);
      margin-bottom: 8px;
      font-size: 18px;
    }

    .floating-card p{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .section{
      padding: 18px 0;
    }

    .section-head{
      margin-bottom: 16px;
    }

    .section-head h2{
      font-size: clamp(26px, 3vw, 38px);
      margin-bottom: 10px;
      color: var(--cyan2);
    }

    .section-head p{
      color: var(--muted);
      max-width: 900px;
      line-height: 1.8;
      font-size: 15px;
    }

    .entry-grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .entry-card{
      position: relative;
      overflow: hidden;
      border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(16,26,45,.96), rgba(13,22,39,.96));
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      transition:.22s ease;
      min-height: 290px;
    }

    .entry-card:hover{
      transform: translateY(-5px);
      border-color: rgba(143,215,255,.22);
    }

    .entry-card.ai{
      background:
        radial-gradient(circle at 20% 20%, rgba(99,179,255,.16), transparent 24%),
        linear-gradient(180deg, rgba(14,26,51,.98), rgba(11,19,39,.98));
    }

    .entry-card.platform{
      background:
        radial-gradient(circle at 75% 25%, rgba(255,92,112,.14), transparent 24%),
        radial-gradient(circle at 15% 80%, rgba(69,212,131,.12), transparent 20%),
        linear-gradient(180deg, rgba(18,22,44,.98), rgba(11,17,32,.98));
    }

    .entry-icon{
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 26px;
      margin-bottom: 16px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }

    .entry-card h3{
      font-size: 26px;
      margin-bottom: 12px;
    }

    .entry-card p{
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .entry-card ul{
      margin-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 13px;
    }

    .entry-link{
      display:inline-block;
      margin-top: 18px;
      color: var(--cyan2);
      font-weight: 700;
      font-size: 14px;
    }

    .layer-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .info-card{
      border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(16,26,45,.96), rgba(13,22,39,.96));
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
    }

    .info-card h3{
      color: #fff;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .info-card p{
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    .faq-wrap{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    details.faq{
      border:1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding: 18px 18px;
    }

    details.faq summary{
      list-style: none;
      cursor:pointer;
      font-weight:700;
      color:#fff;
    }

    details.faq summary::-webkit-details-marker{ display:none; }

    details.faq p{
      color: var(--muted);
      line-height: 1.8;
      margin-top: 12px;
      font-size: 14px;
    }

    .footer{
      margin-top: 28px;
      padding: 22px 0 8px;
      border-top: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .chat-overlay{
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 16, .72);
      backdrop-filter: blur(8px);
      display: none;
      z-index: 1400;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .chat-overlay.open{
      display:flex;
      animation: fadeIn .25s ease;
    }

    .chat-modal{
      width: 100%;
      max-width: 980px;
      height: min(84vh, 760px);
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(143,215,255,.14);
      background:
        radial-gradient(circle at 15% 18%, rgba(99,179,255,.12), transparent 20%),
        linear-gradient(180deg, rgba(13,21,37,.98), rgba(9,15,28,.98));
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      display:grid;
      grid-template-columns: 320px 1fr;
    }

    .chat-sidebar{
      border-right: 1px solid rgba(255,255,255,.06);
      padding: 18px;
      background: rgba(255,255,255,.02);
    }

    .chat-sidebar h3{
      color: var(--cyan2);
      font-size: 20px;
      margin-bottom: 10px;
    }

    .chat-sidebar p{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .cap-list{
      display:grid;
      gap:10px;
    }

    .cap-item{
      border:1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .cap-item strong{
      color: #fff;
      display:block;
      margin-bottom: 4px;
    }

    .chat-main{
      display:grid;
      grid-template-rows: auto 1fr auto;
      min-height:0;
    }

    .chat-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .chat-head-title{
      color:#fff;
      font-size: 18px;
      font-weight: 700;
    }

    .chat-head-sub{
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .close-chat{
      width:42px;
      height:42px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color:#fff;
      cursor:pointer;
      font-size:18px;
    }

    .chat-messages{
      padding: 18px;
      overflow:auto;
      display:grid;
      gap:14px;
    }

    .msg{
      max-width: 78%;
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.8;
      font-size: 14px;
    }

    .msg.ai{
      justify-self: start;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      color:#eef5ff;
    }

    .msg.user{
      justify-self: end;
      background: linear-gradient(90deg, rgba(99,179,255,.22), rgba(69,212,131,.16));
      border:1px solid rgba(143,215,255,.14);
      color:#fff;
    }

    .chat-input{
      border-top: 1px solid rgba(255,255,255,.06);
      padding: 14px 18px;
      display:flex;
      gap:10px;
    }

    .chat-input input{
      flex:1;
      min-width:0;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1423;
      color:#fff;
      padding: 14px 16px;
      outline:none;
    }

    .send-btn{
      min-width: 120px;
      border:none;
      border-radius: 14px;
      font-weight:700;
      cursor:pointer;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      color:#07101d;
    }

    @keyframes pulseGlow{
      0%,100%{ box-shadow: 0 0 20px rgba(99,179,255,.10); }
      50%{ box-shadow: 0 0 34px rgba(99,179,255,.20); }
    }

    @keyframes slideInUp{
      from{ opacity:0; transform: translateY(20px); }
      to{ opacity:1; transform: translateY(0); }
    }

    @keyframes floatY{
      0%,100%{ transform: translateY(0px); }
      50%{ transform: translateY(-8px); }
    }

    @keyframes fadeIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @media (max-width: 1180px){
      .hero-grid,
      .layer-grid,
      .faq-wrap{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px){
      .chat-modal{
        grid-template-columns: 1fr;
        height: min(88vh, 820px);
      }
      .chat-sidebar{
        display:none;
      }
    }

    @media (max-width: 760px){
      .topbar-inner{ padding: 12px 14px; }
      .brand-title{ font-size: 18px; }
      .brand-sub{ display:none; }
      .page-shell{ padding: 0 14px 40px; }
      .hero-shell{ padding: 22px; border-radius: 22px; }
      .hero-actions{ flex-direction: column; }
      .btn{ width: 100%; }
      .entry-grid,
      .layer-grid,
      .faq-wrap{
        grid-template-columns: 1fr;
      }
      .drawer{ width: 100vw; max-width: 100vw; right: -100vw; }
      .top-btn.ai-btn{
        min-width: auto;
        padding: 0 12px;
      }
      .lang{
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>

    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-title">ZENTRA</div>
          <
