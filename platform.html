<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Platform</title><style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#08101d;
  color:#ecf3ff;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:24px;
}
.card{
  background:#0f1728;
  border:1px solid #1f2d48;
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.btn{
  display:inline-block;
  padding:12px 16px;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  text-decoration:none;
  margin-right:10px;
}
.mini{
  background:#111c31;
  border:1px solid #1f2d48;
  border-radius:12px;
  padding:14px;
}
.muted{color:#9db0d1}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style></head><body><div class="wrap">  <div class="card">
    <h1>ZENTRA Platform</h1>
    <p class="muted">Global Economic AI Operating System</p><div style="margin-top:12px">
  <a href="/zentra-main.html" class="btn">Main System</a>
  <a href="/trade-intelligence.html" class="btn">Trade Intelligence</a>
  <a href="/trade-action.html" class="btn">Trade Action</a>
</div>

  </div>  <div class="grid"><div class="card">
  <h2>System Status</h2>
  <div id="statusBox">Loading...</div>
</div>

<div class="card">
  <h2>AI Decision Snapshot</h2>
  <div id="aiBox">Loading...</div>
</div>

  </div></div><script type="module">
import { runZentraFlow } from "./core-system/systemOrchestrator.js?v=6";

const statusBox = document.getElementById("statusBox");
const aiBox = document.getElementById("aiBox");

function render(){
  try{
    const r = runZentraFlow();

    // STATUS
    statusBox.innerHTML = `
      <div class="mini">
        System: <b>ACTIVE</b><br>
        Risk Score: <b>${r.security.score}</b><br>
        Trade Profit: <b>${r.trade.profit}</b><br>
        Logistics: <b>${r.logistics.mode}</b>
      </div>
    `;

    // AI
    const ai = r.aiDecision;
    const pred = r.predictiveTrade;
    const risk = r.riskForecast;

    const color =
      ai.recommendation === "EXECUTE" ? "#22c55e" :
      ai.recommendation === "REVIEW" ? "#f59e0b" :
      "#ef4444";

    aiBox.innerHTML = `
      <div class="mini">
        <h3 style="color:${color}">${ai.recommendation}</h3>
        Score: <b>${ai.aiDecisionScore}</b><br>
        Confidence: <b>${ai.confidence}</b>
      </div>

      <div class="mini">
        <h3>Predictive</h3>
        Trend: <b>${pred.nextTrend}</b><br>
        Signal: <b>${pred.predictiveSignal}</b>
      </div>

      <div class="mini">
        <h3>Risk</h3>
        Level: <b>${risk.riskForecastLevel}</b><br>
        Score: <b>${risk.riskForecastScore}</b>
      </div>
    `;
  }catch(e){
    console.error(e);
    aiBox.innerHTML = "Error loading AI";
  }
}

render();
</script></body>
</html>
