<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA Main</title>
  <script src="/auth-guard.js"></script>
  <script src="/secure-page-loader.js"></script>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#08101d;color:#ecf3ff}
    .wrap{max-width:1100px;margin:auto;padding:24px}
    .card{background:#0f1728;border:1px solid #1f2d48;border-radius:16px;padding:18px;margin-bottom:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{font-size:28px;font-weight:700;margin:0}
    .muted{color:#9db0d1}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    a.btn,button.btn{display:inline-block;text-decoration:none;padding:11px 14px;border-radius:10px;border:0;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer}
    a.btn.secondary,button.btn.secondary{background:#1f2d48}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title">ZENTRA Main</h1>
          <div class="muted">Korumalı shell ekranı</div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/platform.html">Platform</a>
          <button class="btn" onclick="logoutZentra()">Logout</button>
        </div>
      </div>
    </div>

    <div id="app" class="card">
      <div class="muted">Yükleniyor...</div>
    </div>
  </div>
</body>
</html>
