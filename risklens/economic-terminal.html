<script type="module">
import { runBrain } from "../engines/brainEngine.js";

const brain = runBrain();

const riskScoreEl = document.getElementById("globalRiskScore");
const riskLevelEl = document.getElementById("riskLevel");
const driverEl = document.getElementById("dominantDriver");
const summaryEl = document.getElementById("globalSummary");

const oilEl = document.getElementById("oilValue");
const goldEl = document.getElementById("goldValue");
const sp500El = document.getElementById("sp500Value");
const interestEl = document.getElementById("interestValue");
const shippingEl = document.getElementById("shippingValue");

if (riskScoreEl) riskScoreEl.textContent = brain.riskScore;
if (riskLevelEl) riskLevelEl.textContent = brain.riskLevel.toUpperCase();
if (driverEl) driverEl.textContent = brain.driver;

if (summaryEl) {
  summaryEl.textContent =
    brain.advisory.shortTerm + " / " + brain.advisory.midTerm;
}

if (oilEl) oilEl.textContent = brain.markets.oil;
if (goldEl) goldEl.textContent = brain.markets.gold;
if (sp500El) sp500El.textContent = brain.markets.sp500;
if (interestEl) interestEl.textContent = brain.markets.interestRate;
if (shippingEl) shippingEl.textContent = brain.markets.shipping;
</script>
