<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZENTRA Access</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050c16;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:#0d1b2a;
border:1px solid #1f3a56;
border-radius:14px;
padding:40px;
width:340px;
text-align:center;
}

h1{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #1f3a56;
background:#13263a;
color:white;
}

button{
margin-top:14px;
padding:12px;
width:100%;
border-radius:8px;
border:none;
background:#3a7cff;
color:white;
font-weight:bold;
cursor:pointer;
}

.error{
color:#ff6b6b;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h1>ZENTRA</h1>
<p>Platform Access Required</p>

<input id="pass" type="password" placeholder="Enter Access Key">

<button onclick="check()">Enter Platform</button>

<div id="error" class="error"></div>

</div>

<script>

function check(){

const pass=document.getElementById("pass").value

if(pass==="ZentraCore"){

localStorage.setItem("zentraAuth","true")

window.location="/platform.html"

}else{

document.getElementById("error").innerText="Access Denied"

}

}

</script>

</body>
</html>
