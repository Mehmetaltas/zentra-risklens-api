<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZENTRA Financial Telescope</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#050814;
color:#eaf2ff;
font-family:Arial;
margin:0;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#0c1228;
border:1px solid #1e2a55;
border-radius:12px;
padding:20px;
margin-bottom:16px;
}

h1{
color:#00d4ff;
}

.value{
font-size:36px;
margin-top:8px;
}

.band{
padding:6px 10px;
border-radius:6px;
display:inline-block;
margin-top:10px;
}

.low{background:#19e68c;color:black}
.mid{background:#f5b942;color:black}
.high{background:#ff4d6d;color:white}

canvas{
background:#07101f;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="wrap">

<h1>ZENTRA Financial Telescope</h1>

<div class="card">
<strong>Global Risk Index</strong>
<div id="globalRisk" class="value">loading...</div>
<div id="band" class="band">...</div>
</div>

<div class="card">
<strong>Risk Score</strong>
<div id="riskScore" class="value">loading...</div>
<div id="state"></div>
</div>

<div class="card">
<strong>AI Reason</strong>
<div id="reason">loading...</div>
</div>

<div class="card">
<strong>AI Advice</strong>
<div id="advice">loading...</div>
</div>

<div class="card">
<strong>Risk History</strong>
<canvas id="chart" height="120"></canvas>
</div>

</div>

<script>

const API =
"https://api.allorigins.win/raw?url=https://zentra-risklens-api-2.onrender.com/telescope"

async function load(){

try{

const res = await fetch(API)
const data = await res.json()

document.getElementById("globalRisk").innerText =
data.global_risk_index

document.getElementById("riskScore").innerText =
data.risk_score

document.getElementById("state").innerText =
data.economic_state

document.getElementById("reason").innerText =
data.ai_reason

document.getElementById("advice").innerText =
data.ai_advice

let band="mid"

if(data.global_risk_index<40) band="low"
if(data.global_risk_index>70) band="high"

const bandBox=document.getElementById("band")
bandBox.className="band "+band
bandBox.innerText=band.toUpperCase()

}catch(e){

document.getElementById("globalRisk").innerText="API ERROR"

}

}

load()

</script>

</body>
</html>
