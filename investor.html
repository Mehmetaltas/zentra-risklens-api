<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZENTRA Investor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#050814;
--card:#0c1228;
--line:#1e2a55;
--text:#eaf2ff;
--cyan:#00d4ff;
--green:#19e68c;
--gold:#f5b942;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
}

.wrap{
max-width:1100px;
margin:auto;
padding:24px;
}

h1{
color:var(--cyan);
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
margin-top:16px;
}

.metric{
text-align:center;
}

.metric strong{
display:block;
font-size:32px;
color:var(--cyan);
}

</style>

</head>


<body>

<div class="wrap">

<h1>ZENTRA Platform Dashboard</h1>

<p>High level infrastructure signals for investors</p>


<div class="grid">

<div class="card metric">
<strong>12</strong>
Lens Modules
</div>

<div class="card metric">
<strong>2</strong>
Live Engines
</div>

<div class="card metric">
<strong>10+</strong>
Institution Types
</div>

<div class="card metric">
<strong>128</strong>
Signal Paths
</div>

</div>



<div class="card">

<h2>Risk Trend</h2>

<canvas id="riskChart"></canvas>

</div>


<div class="card">

<h2>Institution Coverage</h2>

<div class="grid">

<div>Banks</div>
<div>Fintech</div>
<div>ERP Systems</div>
<div>Insurance</div>
<div>Funds</div>
<div>SME Finance</div>

</div>

</div>

</div>


<script>

const ctx = document.getElementById('riskChart');

new Chart(ctx,{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[
{
label:'Behavior Risk',
data:[42,48,53,57,61,66],
borderColor:'#00d4ff'
},
{
label:'Stress Pressure',
data:[35,39,44,48,52,58],
borderColor:'#19e68c'
}
]
}
});

</script>

</body>
</html>
