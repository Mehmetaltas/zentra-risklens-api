<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA TEST</title>
  <style>
    body{
      margin:0;
      padding:24px;
      font-family:Arial,Helvetica,sans-serif;
      background:#08101d;
      color:#ecf3ff;
    }
    .wrap{
      max-width:1100px;
      margin:auto;
    }
    .card{
      background:#0f1728;
      border:1px solid #1f2d48;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    h1{margin:0 0 12px}
    .muted{color:#9db0d1}
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:12px;
      padding:16px;
      overflow:auto;
      color:#dbeafe;
    }
    .ok{color:#86efac}
    .err{color:#fecaca}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ZENTRA TEST RUNNER</h1>
      <div id="status" class="muted">Loading...</div>
    </div>

    <div class="card">
      <div id="output">Bekleniyor...</div>
    </div>
  </div>

  <script type="module">
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    async function boot() {
      try {
        statusEl.innerHTML = 'Status: <span class="ok">Importing orchestrator...</span>';

        const mod = await import("./core-system/systemOrchestrator.js?v=2");
        const result = mod.runZentraFlow();

        statusEl.innerHTML = 'Status: <span class="ok">Flow completed successfully.</span>';

        outputEl.innerHTML = `
          <pre>${escapeHtml(JSON.stringify(result, null, 2))}</pre>
        `;
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = 'Status: <span class="err">Flow error.</span>';
        outputEl.innerHTML = `
          <pre class="err">${escapeHtml(String(err && err.stack ? err.stack : err))}</pre>
        `;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    boot();
  </script>
</body>
</html>
