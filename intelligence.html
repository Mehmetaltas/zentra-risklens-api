<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Trade Intelligence</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#08101d;
  color:#ecf3ff;
}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{
  background:#0f1728;
  border:1px solid #1f2d48;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
h1{margin:0 0 10px}
.btn{
  padding:10px 14px;
  background:#1f2d48;
  border-radius:8px;
  cursor:pointer;
  display:inline-block;
}
.signal{margin-top:10px;padding:10px;background:#111c31;border-radius:8px}
.high{color:#ef4444}
.medium{color:#f59e0b}
.low{color:#22c55e}
</style>
</head>

<body>
<div class="wrap">

<h1>ZENTRA Trade Intelligence</h1>

<div class="card">
  <div class="btn" onclick="runFlow()">Run Trade Intelligence</div>
  <p id="status">Status: waiting</p>
</div>

<div id="result"></div>

</div>

<script type="module">
import { runZentraFlow } from "./core-system/systemOrchestrator.js";

window.runFlow = async function(){
  document.getElementById("status").innerText="Running...";

  try{
    const r = runZentraFlow();

    document.getElementById("status").innerText="Completed";

    const html = `
    <div class="card">
      <h2>Opportunity</h2>
      Product: ${r.data.product}<br>
      Region: ${r.data.region}<br>
      Demand: ${r.data.demand}<br>
    </div>

    <div class="card">
      <h2>Profit</h2>
      Net Profit: ${r.offer.netProfit}
    </div>

    <div class="card">
      <h2>Trade Action</h2>
      <div class="btn" onclick="alert('Supplier contact simulated')">Contact Supplier</div>
      <div class="btn" onclick="alert('Logistics quote simulated')">Request Logistics</div>
      <div class="btn" onclick="alert('Hedge plan simulated')">Open Hedge Plan</div>
    </div>

    <div class="card">
      <h2>Signals</h2>
      ${r.data.demand==="HIGH" ? '<div class="signal high">High demand detected</div>' : ''}
    </div>
    `;

    document.getElementById("result").innerHTML=html;

  }catch(e){
    document.getElementById("status").innerText="ERROR";
    console.error(e);
  }
}
</script>

</body>
</html>
