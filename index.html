<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA — Economic Operating System</title>
  <meta name="description" content="ZENTRA Economic Operating System — yapay zeka, risk zekası, simülasyon, ticaret, kariyer ve küresel ekonomik ağ." />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

  <style>
    :root{
      --bg:#06101f;
      --bg2:#0b1730;
      --panel:rgba(13,25,53,.74);
      --panel2:rgba(9,19,41,.94);
      --panel3:#071120;
      --line:rgba(77,140,223,.22);
      --text:#eef5ff;
      --muted:#9ab6d9;
      --cyan:#49ddff;
      --blue:#5b8cff;
      --green:#54f2a1;
      --amber:#ffd166;
      --red:#ff6b6b;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:24px;
      --max:1280px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,Arial,
        html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(73,221,255,.10), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(91,140,255,.14), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(84,242,161,.08), transparent 34%),
        linear-gradient(180deg,#040b16 0%, #071021 35%, #08142a 100%);
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .grid-bg, .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-3;
    }

    .grid-bg{
      background-image:
        linear-gradient(rgba(82,134,212,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,134,212,.08) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, rgba(255,255,255,.25), transparent 80%);
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(14px);
      background:rgba(6,13,27,.65);
      border-bottom:1px solid rgba(92,129,190,.18);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:.08em;
    }

    .brand-mark{
      width:38px;
      height:38px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 10px 30px rgba(73,221,255,.25);
      position:relative;
      overflow:hidden;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .nav a{
      padding:10px 12px;
      border-radius:12px;
      color:#bfe2ff;
      font-size:13px;
      transition:.25s ease;
    }

    .nav a:hover{
      background:rgba(73,221,255,.08);
      color:#fff;
    }

    .container{
      max-width:var(--max);
      margin:0 auto;
      padding:0 18px;
    }

    .hero{
      min-height:92vh;
      display:grid;
      grid-template-columns:1.15fr .85fr;
      align-items:center;
      gap:30px;
      padding:40px 0 60px;
    }

    .hero h1{
      font-size:64px;
      line-height:1.02;
      margin:0 0 18px;
      letter-spacing:-.04em;
    }

    .gradient-text{
      background:linear-gradient(90deg,#f7fbff 0%, #78efff 50%, #8fa9ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero p{
      color:var(--muted);
      font-size:17px;
      line-height:1.8;
      max-width:700px;
      margin:0 0 24px;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font-weight:700;
      transition:.25s ease;
    }

    .btn-primary{
      color:#05101b;
      background:linear-gradient(90deg,var(--cyan),#7df0ff);
      box-shadow:0 10px 28px rgba(73,221,255,.20);
    }

    .btn-secondary{
      color:#d7eeff;
      background:rgba(15,26,51,.85);
      border:1px solid var(--line);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:20px;
      backdrop-filter:blur(6px);
      transition:.3s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:var(--shadow);
    }

    .card h3{
      margin:0 0 10px;
      color:var(--cyan);
    }

    footer{
      margin-top:80px;
      text-align:center;
      padding:40px 20px;
      border-top:1px solid var(--line);
      color:var(--muted);
    }

    @media(max-width:900px){
      .hero{
        grid-template-columns:1fr;
        text-align:center;
      }

      .hero h1{
        font-size:42px;
      }

      .cards{
        grid-template-columns:1fr;
      }
    }
