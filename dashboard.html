<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRA Global Economic Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
}

header{
background:#08132a;
padding:20px;
text-align:center;
border-bottom:1px solid #103865;
}

header h1{
margin:0;
color:#00e0ff;
}

nav{
margin-top:10px;
}

nav a{
color:#7bdfff;
margin:0 10px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#0e1c38;
padding:20px;
border-radius:8px;
}

.card h3{
color:#00e0ff;
margin-top:0;
}

#map{
height:400px;
border-radius:8px;
}

.chatbox{
height:250px;
overflow:auto;
background:#020814;
padding:10px;
margin-bottom:10px;
}

input{
width:75%;
padding:10px;
background:#08132a;
border:none;
color:white;
}

button{
padding:10px;
background:#00e0ff;
border:none;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#08132a;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>ZENTRA Global Economic Dashboard</h1>

<nav>

<a href="index.html">Home</a>
<a href="advisor.html">AI Advisor</a>
<a href="dashboard.html">Dashboard</a>
<a href="platform.html">Platform</a>

</nav>

</header>

<div class="container">

<div class="grid">

<div class="card">

<h3>Global Economic Risk Map</h3>

<div id="map"></div>

</div>

<div class="card">

<h3>Global Risk Index</h3>

<canvas id="riskChart"></canvas>

</div>

<div class="card">

<h3>AI Economic Advisor</h3>

<div class="chatbox" id="chat"></div>

<input id="question" placeholder="Ask economic question...">

<button onclick="ask()">Ask</button>

</div>

<div class="card">

<h3>Crisis Radar</h3>

<p id="crisis">Monitoring global economic signals...</p>

</div>

</div>

</div>

<footer>

ZENTRA Economic OS • Global Financial Intelligence Platform

</footer>

<script>

const API="https://zentra-core-api.onrender.com"

async function loadRisk(){

try{

const res=await fetch(API+"/telescope")
const data=await res.json()

document.getElementById("crisis").innerText=
data.ai_reason+" — "+data.ai_advice

}catch{

document.getElementById("crisis").innerText="API unavailable"

}

}

async function loadChart(){

const res=await fetch(API+"/history")
const data=await res.json()

const labels=data.map(d=>d.timestamp)
const values=data.map(d=>d.global_risk)

new Chart(

document.getElementById("riskChart"),

{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Global Risk Index",
data:values,
borderColor:"#00e0ff"
}]
}
}

)

}

function ask(){

const q=document.getElementById("question").value

const chat=document.getElementById("chat")

chat.innerHTML+="<div>👤 "+q+"</div>"

chat.innerHTML+="<div>🤖 ZENTRA analyzing economic context...</div>"

}

var map = L.map('map').setView([20,0],2);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{

maxZoom: 6

}

).addTo(map);

var countries=[

["USA",37,-95,40],
["Germany",51,10,35],
["China",35,103,45],
["India",20,78,50],
["Turkey",39,35,69],
["Brazil",-10,-55,52],
["South Africa",-30,25,55],
["Argentina",-38,-63,77]

]

countries.forEach(c=>{

var color="green"

if(c[3]>60)color="red"
else if(c[3]>45)color="orange"

L.circleMarker(

[c[1],c[2]],

{
radius:8,
color:color
}

).addTo(map).bindPopup(

c[0]+" Risk: "+c[3]

)

})

loadRisk()
loadChart()

</script>

</body>

</html>
