<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRA Economic OS</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

</head>

<body>

<nav>

<div class="logo">ZENTRA</div>

<div class="links">

<a href="#dashboard">Dashboard</a>
<a href="#map">Map</a>
<a href="#scenario">Scenario</a>
<a href="#sme">SME</a>
<a href="#trade">Trade</a>
<a href="#chat">AI</a>

</div>

</nav>


<section id="dashboard" class="section">

<h2>Dashboard</h2>

<div class="grid">

<div class="card">
<div class="small">Global Risk</div>
<div id="riskScore" class="metric">--</div>
</div>

<div class="card">
<div class="small">State</div>
<div id="state" class="metric">--</div>
</div>

<div class="card">
<div class="small">Trend</div>
<div id="trend" class="metric">--</div>
</div>

</div>

</section>


<section id="map" class="section grid2">

<div class="card">

<h2>Global Risk Map</h2>

<canvas id="worldMap"></canvas>

</div>

<div class="card">

<h2>Country Intelligence</h2>

<div id="countryName">None</div>

<div id="countryRisk"></div>

<div id="countryInfo" class="result">

Click country

</div>

</div>

</section>


<section id="scenario" class="section">

<h2>Scenario Engine</h2>

<select id="scenarioName">

<option value="interest">Interest Shock</option>
<option value="currency">Currency Shock</option>
<option value="oil">Oil Spike</option>

</select>

<button onclick="runScenario()">Run Scenario</button>

<div id="scenarioResult" class="result"></div>

</section>


<section id="sme" class="section">

<h2>SME Analyzer</h2>

<input id="smeRevenue" placeholder="Revenue">

<input id="smeCost" placeholder="Cost">

<input id="smeDebt" placeholder="Debt">

<button onclick="runSME()">Analyze</button>

<div id="smeResult" class="result"></div>

</section>


<section id="trade" class="section">

<h2>Trade Engine</h2>

<input id="tradeOrigin" placeholder="Origin">

<input id="tradeDestination" placeholder="Destination">

<input id="tradeProduct" placeholder="Product">

<button onclick="runTrade()">Analyze</button>

<div id="tradeResult" class="result"></div>

</section>


<section id="chat" class="section">

<h2>ZENTRA AI</h2>

<div id="chatBox" class="chatbox">

ZENTRA AI ready

</div>

<textarea id="chatInput"></textarea>

<button onclick="askChat()">Send</button>

</section>

<script src="script.js"></script>

</body>
</html>
