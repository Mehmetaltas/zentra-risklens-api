<!doctype html>
<html>

<title>RiskLens Advisor</title>

<body style="background:#050814;color:white;text-align:center;padding-top:100px;font-family:Arial">

<h1>RiskLens Advisor</h1>
<p>AI Economic Advisor</p>

<input id="q" placeholder="Ask economic question">

if(q.includes("inflation")){
document.getElementById("result").innerHTML="Inflation risk increasing globally."
}

}

</script>
