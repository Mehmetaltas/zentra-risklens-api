<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Economic Operating System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
overflow-x:hidden;
}

nav{
background:#08132a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:#8bd6ff;
margin-left:15px;
text-decoration:none;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
color:#00e0ff;
}

.section{
max-width:1200px;
margin:auto;
padding:30px;
}

.card{
background:#0e1c38;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.metric{
font-size:28px;
color:#00e0ff;
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
background:#08132a;
color:white;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
background:#00e0ff;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

#chatBox{
background:#020814;
padding:15px;
height:200px;
overflow:auto;
border-radius:10px;
}

</style>
</head>

<body>

<nav>
<div>ZENTRA</div>
<div>
<a href="#dashboard">Dashboard</a>
<a href="#brain">Brain</a>
<a href="#scenario">Scenario</a>
<a href="#chat">AI</a>
</div>
</nav>

<div class="hero">
<h1>ZENTRA Economic OS</h1>
<p>AI powered global economic intelligence platform</p>
</div>

<section id="dashboard" class="section">

<div class="card">
<div>Global Risk Index</div>
<div id="risk" class="metric">--</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</section>

<section id="brain" class="section">

<div class="card">
<div id="brainText">Economic Brain loading...</div>
</div>

</section>

<section id="scenario" class="section">

<div class="card">
<select id="scenarioSelect">
<option value="interest">Interest Shock</option>
<option value="currency">Currency Shock</option>
<option value="demand">Demand Drop</option>
</select>

<button onclick="runScenario()">Run Scenario</button>

<div id="scenarioResult"></div>

</div>

</section>

<section id="chat" class="section">

<div class="card">

<div id="chatBox">
<div><b>ZENTRA:</b> Ask me about economy.</div>
</div>

<textarea id="chatInput"></textarea>

<button onclick="ask()">Send</button>

</div>

</section>

<script>

function randomRisk(){
return Math.floor(Math.random()*100)
}

let risk=randomRisk()

document.getElementById("risk").innerText=risk

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
label:"Risk",
data:[20,40,30,60,50]
}]
}
})

document.getElementById("brainText").innerText=
"Global economy shows moderate pressure. Monitor inflation and energy."

function runScenario(){

let s=document.getElementById("scenarioSelect").value

let result=""

if(s=="interest"){
result="Interest increase may slow credit expansion."
}

if(s=="currency"){
result="Currency shock may increase import costs."
}

if(s=="demand"){
result="Demand drop may pressure retail sector."
}

document.getElementById("scenarioResult").innerText=result

}

function ask(){

let q=document.getElementById("chatInput").value

let box=document.getElementById("chatBox")

box.innerHTML+=`<div><b>You:</b> ${q}</div>`

box.innerHTML+=`<div><b>ZENTRA:</b> Economic analysis suggests monitoring macro indicators.</div>`

}

</script>

</body>
</html>
