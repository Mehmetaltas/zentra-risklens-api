<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA API TEST</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08101d;
      color:#ecf3ff;
    }
    .wrap{
      max-width:1000px;
      margin:auto;
      padding:24px;
    }
    .card{
      background:#0f1728;
      border:1px solid #1f2d48;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .full{
      grid-column:1 / -1;
    }
    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #263655;
      background:#0b1527;
      color:#ecf3ff;
      box-sizing:border-box;
    }
    button{
      padding:12px 16px;
      border-radius:10px;
      border:0;
      background:#3b82f6;
      color:white;
      font-weight:700;
      cursor:pointer;
      margin-right:10px;
      margin-top:10px;
    }
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:12px;
      padding:16px;
      overflow:auto;
    }
    .muted{
      color:#9db0d1;
    }
    @media(max-width:800px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ZENTRA API TEST</h1>
      <p class="muted">Register / Login / Me / Trade / Offer / Payment / Log test ekranı</p>
    </div>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label>Full Name</label>
          <input id="full_name" value="Mehmet Altaş" />
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" value="mehmet2@zentra.com" />
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" value="123456" />
        </div>

        <div class="field">
          <label>Product</label>
          <input id="product" value="Steel" />
        </div>

        <div class="field">
          <label>Buy Price</label>
          <input id="buy_price" type="number" value="1000" />
        </div>

        <div class="field">
          <label>Sell Price</label>
          <input id="sell_price" type="number" value="1200" />
        </div>

        <div class="field">
          <label>Volume</label>
          <input id="volume" type="number" value="100" />
        </div>

        <div class="field">
          <label>Trade ID</label>
          <input id="trade_id" value="TRD-20260321-1172" />
        </div>

        <div class="field">
          <label>Total Cost</label>
          <input id="total_cost" type="number" value="600" />
        </div>

        <div class="field">
          <label>Sell Value</label>
          <input id="sell_value" type="number" value="120000" />
        </div>

        <div class="field">
          <label>Net Profit</label>
          <input id="net_profit" type="number" value="119400" />
        </div>

        <div class="field">
          <label>Payment Amount</label>
          <input id="amount" type="number" value="120000" />
        </div>

        <div class="field">
          <label>Currency</label>
          <input id="currency" value="USD" />
        </div>

        <div class="field">
          <label>Payment Method</label>
          <input id="method" value="SWIFT" />
        </div>

        <div class="field full">
          <label>Log Message</label>
          <input id="log_message" value="Trade flow moved to offer and payment stage" />
        </div>
      </div>

      <div style="margin-top:16px">
        <button onclick="registerUser()">Register</button>
        <button onclick="loginUser()">Login</button>
        <button onclick="checkMe()">Me</button>
        <button onclick="logoutUser()">Logout</button>
        <button onclick="createTrade()">Trade Create</button>
        <button onclick="createOffer()">Offer Create</button>
        <button onclick="createPayment()">Payment Create</button>
        <button onclick="writeLog()">Log Write</button>
        <button onclick="clearOutput()">Clear</button>
      </div>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div id="status" class="muted">Hazır</div>
    </div>

    <div class="card">
      <h2>Output</h2>
      <pre id="output">Bekleniyor...</pre>
    </div>
  </div>

  <script>
    const API_BASE = "https://zentra-v2-rrgj.vercel.app/api";
    let authToken = localStorage.getItem("zentra_token") || "";

    function setStatus(text){
      document.getElementById("status").textContent = text;
    }

    function setOutput(data){
      document.getElementById("output").textContent =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    function clearOutput(){
      setStatus("Hazır");
      setOutput("Bekleniyor...");
    }

    async function postJson(url, body){
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(authToken ? { "Authorization": `Bearer ${authToken}` } : {})
        },
        body: JSON.stringify(body)
      });

      const data = await response.json();
      return { ok: response.ok, status: response.status, data };
    }

    async function getJson(url){
      const response = await fetch(url, {
        method: "GET",
        headers: {
          ...(authToken ? { "Authorization": `Bearer ${authToken}` } : {})
        }
      });

      const data = await response.json();
      return { ok: response.ok, status: response.status, data };
    }

    async function registerUser(){
      try{
        setStatus("Register gönderiliyor...");

        const body = {
          full_name: document.getElementById("full_name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        };

        const result = await postJson(`${API_BASE}/register`, body);
        setStatus(`Register tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Register hata");
        setOutput(err.message);
      }
    }

    async function loginUser(){
      try{
        setStatus("Login gönderiliyor...");

        const body = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        };

        const result = await postJson(`${API_BASE}/login`, body);

        if (result.data && result.data.token) {
          authToken = result.data.token;
          localStorage.setItem("zentra_token", authToken);
        }

        setStatus(`Login tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Login hata");
        setOutput(err.message);
      }
    }

    async function checkMe(){
      try{
        setStatus("Token kontrol ediliyor...");
        const result = await getJson(`${API_BASE}/me`);
        setStatus(`Me tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Me hata");
        setOutput(err.message);
      }
    }

    function logoutUser(){
      authToken = "";
      localStorage.removeItem("zentra_token");
      setStatus("Çıkış yapıldı");
      setOutput({ status: "LOGOUT_OK" });
    }

    async function createTrade(){
      try{
        setStatus("Trade create gönderiliyor...");

        const body = {
          product: document.getElementById("product").value,
          buy_price: Number(document.getElementById("buy_price").value),
          sell_price: Number(document.getElementById("sell_price").value),
          volume: Number(document.getElementById("volume").value)
        };

        const result = await postJson(`${API_BASE}/trade-create`, body);
        setStatus(`Trade create tamamlandı (${result.status})`);
        setOutput(result.data);

        if (result.data && result.data.trade && result.data.trade.trade_id) {
          document.getElementById("trade_id").value = result.data.trade.trade_id;
        }
      }catch(err){
        setStatus("Trade create hata");
        setOutput(err.message);
      }
    }

    async function createOffer(){
      try{
        setStatus("Offer create gönderiliyor...");

        const body = {
          trade_id: document.getElementById("trade_id").value,
          product: document.getElementById("product").value,
          volume: Number(document.getElementById("volume").value),
          total_cost: Number(document.getElementById("total_cost").value),
          sell_value: Number(document.getElementById("sell_value").value),
          net_profit: Number(document.getElementById("net_profit").value)
        };

        const result = await postJson(`${API_BASE}/offer-create`, body);
        setStatus(`Offer create tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Offer create hata");
        setOutput(err.message);
      }
    }

    async function createPayment(){
      try{
        setStatus("Payment create gönderiliyor...");

        const body = {
          trade_id: document.getElementById("trade_id").value,
          amount: Number(document.getElementById("amount").value),
          currency: document.getElementById("currency").value,
          method: document.getElementById("method").value
        };

        const result = await postJson(`${API_BASE}/payment-create`, body);
        setStatus(`Payment create tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Payment create hata");
        setOutput(err.message);
      }
    }

    async function writeLog(){
      try{
        setStatus("Log write gönderiliyor...");

        const body = {
          action_type: "TRADE_FLOW",
          ref_id: document.getElementById("trade_id").value,
          message: document.getElementById("log_message").value,
          level: "info"
        };

        const result = await postJson(`${API_BASE}/log-write`, body);
        setStatus(`Log write tamamlandı (${result.status})`);
        setOutput(result.data);
      }catch(err){
        setStatus("Log write hata");
        setOutput(err.message);
      }
    }
  </script>
</body>
  </html>
