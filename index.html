<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ZENTRA Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#050814;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

h1{
color:#00d4ff;
}

.card{
background:#0c1228;
border:1px solid #1e2a55;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.risk{
font-size:40px;
font-weight:bold;
}

.low{color:#19e68c}
.medium{color:#f5b942}
.high{color:#ff4d6d}
.critical{color:#ff0000}

</style>

</head>

<body>

<h1>ZENTRA Financial Telescope</h1>

<div class="card">

<h2>Global Risk Index</h2>

<div id="riskScore" class="risk">loading...</div>

<div id="riskBand"></div>

</div>

<div class="card">

<h2>Economic State</h2>

<div id="ecoState"></div>

</div>

<div class="card">

<h2>Strategy</h2>

<div id="strategy"></div>

</div>

<div class="card">

<h2>Market</h2>

<div id="market"></div>

</div>

<div class="card">

<canvas id="riskChart"></canvas>

</div>

<script>

async function loadData(){

let res = await fetch("https://zentra-risklens-api-2.onrender.com/telescope")

let data = await res.json()

let risk = data.global_risk_index

let band = data.risk_band

document.getElementById("riskScore").innerHTML = risk

document.getElementById("riskBand").innerHTML = band

document.getElementById("ecoState").innerHTML = data.economic_state

document.getElementById("strategy").innerHTML = data.strategy.strategy

document.getElementById("market").innerHTML =
"BTC: " + data.market.btc_price +
" (" + data.market.market_trend + ")"

document.getElementById("riskScore").className = "risk " + band

createChart(risk)

}

function createChart(risk){

const ctx = document.getElementById('riskChart')

new Chart(ctx,{
type:'bar',
data:{
labels:["Global Risk"],
datasets:[{
data:[risk],
backgroundColor:"#00d4ff"
}]
},
options:{
plugins:{
legend:{display:false}
},
scales:{
y:{
min:0,
max:100
}
}
}
})

}

loadData()

</script>

</body>
</html>
