<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZENTRA RiskLens</title>

<style>
body{
margin:0;
font-family:Arial;
background:#08111f;
color:white;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#0d1b2a;
border:1px solid #1f3a56;
border-radius:12px;
padding:16px;
margin-bottom:16px;
}

h1{
margin:0 0 10px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.metric{
background:#13263a;
padding:12px;
border-radius:8px;
}

.metric .value{
font-size:26px;
font-weight:bold;
}

.signal{
background:#13263a;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.high{color:#ff6b6b}
.medium{color:#ffb347}
.low{color:#38d39f}

</style>
</head>

<body>

<div class="wrap">

<h1>ZENTRA RiskLens Dashboard</h1>

<div class="card">

<div class="grid">

<div class="metric">
<div>Global Risk Score</div>
<div class="value" id="riskScore">--</div>
</div>

<div class="metric">
<div>Risk Level</div>
<div class="value" id="riskLevel">--</div>
</div>

<div class="metric">
<div>Dominant Driver</div>
<div class="value" id="driver">--</div>
</div>

</div>

<p id="summary">Loading...</p>

</div>


<div class="card">
<h3>Markets</h3>

<div class="grid">

<div class="metric">
Oil
<div class="value" id="oil"></div>
</div>

<div class="metric">
Gold
<div class="value" id="gold"></div>
</div>

<div class="metric">
S&P500
<div class="value" id="sp500"></div>
</div>

<div class="metric">
Interest
<div class="value" id="interest"></div>
</div>

<div class="metric">
Shipping
<div class="value" id="shipping"></div>
</div>

</div>

</div>


<div class="card">
<h3>Signals</h3>
<div id="signals"></div>
</div>

</div>

<script>

const DATA = {

dominantDriver:"Energy Pressure",

markets:{
oil:82.4,
gold:2180.5,
sp500:5120.3,
interestRate:4.75,
shipping:1460
},

signals:[
{title:"Energy Pressure",severity:"high",summary:"Energy costs rising globally"},
{title:"Logistics Stress",severity:"medium",summary:"Shipping routes tightening"},
{title:"Market Volatility",severity:"low",summary:"Markets fluctuating mildly"}
]

}


function computeSignals(data){

let score=0

if(data.markets.oil>80)score+=30
if(data.markets.interestRate>4.5)score+=20

data.signals.forEach(s=>{
if(s.severity==="high")score+=15
if(s.severity==="medium")score+=8
if(s.severity==="low")score+=3
})

if(score>100)score=100

let level="LOW"
if(score>=70)level="HIGH"
else if(score>=40)level="MEDIUM"

return{
score,
level,
driver:data.dominantDriver,
signals:data.signals,
markets:data.markets
}

}


function render(){

const result=computeSignals(DATA)

document.getElementById("riskScore").innerText=result.score
document.getElementById("riskLevel").innerText=result.level
document.getElementById("driver").innerText=result.driver

document.getElementById("oil").innerText=result.markets.oil
document.getElementById("gold").innerText=result.markets.gold
document.getElementById("sp500").innerText=result.markets.sp500
document.getElementById("interest").innerText=result.markets.interestRate
document.getElementById("shipping").innerText=result.markets.shipping

document.getElementById("summary").innerText="System monitoring global signals."

const box=document.getElementById("signals")

result.signals.forEach(s=>{

const div=document.createElement("div")
div.className="signal"

div.innerHTML=
"<b>"+s.title+"</b> "+
"<span class='"+s.severity+"'>"+s.severity+"</span>"+
"<div>"+s.summary+"</div>"

box.appendChild(div)

})

}

render()

</script>

</body>
  </html>
