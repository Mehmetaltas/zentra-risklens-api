<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ZENTRA — Global Financial Telescope</title>
  <style>
    body{margin:0;background:#050814;color:#eaf2ff;font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .lang button{margin-right:6px;padding:6px 10px;border-radius:8px;border:1px solid #334;background:#0b1020;color:#eaf2ff;cursor:pointer}
    .lang button.active{background:#00d4ff;color:#001018;border-color:#00d4ff}
    h1{margin:0}
    .sub{color:#8a97b1;font-size:13px;margin-top:6px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .card{border:1px solid #1b2440;border-radius:14px;padding:14px;background:#0b1020}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .tag{padding:4px 8px;border-radius:999px;font-size:11px;border:1px solid #445}
    .tag.wait{color:#f5b942;border-color:#f5b942}
    .tag.ok{color:#19e68c;border-color:#19e68c}
    .tag.bad{color:#ff4d6d;border-color:#ff4d6d}
    .btn{display:inline-block;margin-top:8px;padding:7px 10px;border:1px solid #334;border-radius:8px;text-decoration:none;color:#eaf2ff;font-size:12px}
    .btn:hover{border-color:#00d4ff}
    .gauge{margin-top:10px}
    .big{font-size:28px;font-weight:700}
    .bar{height:10px;background:#111a35;border-radius:999px;overflow:hidden;margin-top:6px}
    .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#19e68c,#00d4ff,#7c3aed)}
    ul{list-style:none;padding:0;margin:10px 0 0 0}
    li{font-size:12px;color:#8a97b1;margin-bottom:4px}
    footer{margin-top:30px;font-size:12px;color:#8a97b1}
  </style>
</head>

<body>
<div class="wrap">

  <div class="top">
    <div>
      <h1 data-t="title">ZENTRA — Global Financial Telescope</h1>
      <div class="sub" data-t="subtitle">
        Behavioral financial infrastructure observing signals across institutions and assets.
      </div>
    </div>
    <div class="lang">
      <button id="btn-en" class="active">EN</button>
      <button id="btn-tr">TR</button>
    </div>
  </div>

  <div class="grid">

    <!-- RiskLens -->
    <div class="card">
      <div class="row">
        <b>RiskLens API</b>
        <span class="tag wait" id="tag-risk">CHECKING</span>
      </div>
      <a class="btn" href="https://zentra-risklens-api-2.onrender.com/health" target="_blank">Health</a>
      <a class="btn" href="https://zentra-risklens-api-2.onrender.com/openapi.json" target="_blank">OpenAPI</a>
    </div>

    <!-- Credit Stress -->
    <div class="card">
      <div class="row">
        <b>Credit Stress Engine</b>
        <span class="tag wait" id="tag-stress">CHECKING</span>
      </div>
      <a class="btn" href="https://zentra-credit-stress-api.onrender.com/health" target="_blank">Health</a>
      <a class="btn" href="https://zentra-credit-stress-api.onrender.com/openapi.json" target="_blank">OpenAPI</a>
    </div>

    <!-- Activity -->
    <div class="card">
      <div class="gauge">
        <div class="big">Score: <span id="score">78</span></div>
        <div class="bar"><i id="bar"></i></div>
        <ul id="last5"></ul>
      </div>
    </div>

  </div>

  <footer>
    © <span id="yr"></span> ZENTRA
  </footer>

</div>

<script>
const riskHealth = "https://zentra-risklens-api-2.onrender.com/health";
const stressHealth = "https://zentra-credit-stress-api.onrender.com/health";

function setTag(el,state){
 if(state==="ok"){el.className="tag ok";el.textContent="OK";}
 else if(state==="bad"){el.className="tag bad";el.textContent="FAIL";}
 else{el.className="tag wait";el.textContent="CHECKING";}
}

async function check(url,tag){
 try{
   const r=await fetch(url);
   const d=await r.json();

   if(d.status==="ok" || d.ok===true){
      setTag(tag,"ok");
   }else{
      setTag(tag,"bad");
   }

 }catch(e){
   setTag(tag,"bad");
 }
}

function runHealth(){
 check(riskHealth,document.getElementById("tag-risk"));
 check(stressHealth,document.getElementById("tag-stress"));
}

runHealth();
setInterval(runHealth,20000);

document.getElementById("yr").textContent=new Date().getFullYear();

/* demo activity */
const scores=[78,72,84,66,59];
const scoreEl=document.getElementById("score");
const barEl=document.getElementById("bar");
const list=document.getElementById("last5");

function render(){
 list.innerHTML="";
 scores.forEach((s,i)=>{
   const li=document.createElement("li");
   li.textContent="#"+(i+1)+" score "+s;
   list.appendChild(li);
 });
 barEl.style.width=scores[0]+"%";
 scoreEl.textContent=scores[0];
}

render();
setInterval(()=>{
 const last=scores.pop();
 scores.unshift(last);
 render();
},3000);

/* language */
const dict={
 en:{
  title:"ZENTRA — Global Financial Telescope",
  subtitle:"Behavioral financial infrastructure observing signals across institutions and assets."
 },
 tr:{
  title:"ZENTRA — Küresel Finans Teleskobu",
  subtitle:"Kurumlar ve varlıklar genelinde davranış sinyallerini gözlemleyen finans altyapısı."
 }
};

function apply(l){
 document.getElementById("btn-en").classList.toggle("active",l==="en");
 document.getElementById("btn-tr").classList.toggle("active",l==="tr");
 document.querySelectorAll("[data-t]").forEach(el=>{
  const k=el.getAttribute("data-t");
  el.textContent=dict[l][k];
 });
}

document.getElementById("btn-en").onclick=()=>apply("en");
document.getElementById("btn-tr").onclick=()=>apply("tr");
</script>

</body>
</html>
