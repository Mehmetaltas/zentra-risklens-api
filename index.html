<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZENTRA Economic OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
}

nav{
background:#08132a;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #103865;
}

.logo{
color:#00e0ff;
font-weight:bold;
}

nav a{
color:#7bdfff;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:90px 20px;
}

.hero h1{
font-size:55px;
color:#00e0ff;
}

.hero p{
max-width:700px;
margin:auto;
font-size:20px;
color:#9dcdf3;
}

.section{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

.card{
background:#0e1c38;
padding:25px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #103865;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#08132a;
color:white;
}

button{
margin-top:10px;
padding:12px 20px;
background:#00e0ff;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
background:#020814;
padding:20px;
margin-top:10px;
border-radius:10px;
}

.metric{
font-size:26px;
color:#00e0ff;
}

footer{
text-align:center;
padding:40px;
background:#08132a;
color:#6fa9d6;
}

</style>

</head>

<body>

<nav>

<div class="logo">ZENTRA</div>

<div>

<a href="#search">Search</a>
<a href="#brain">Brain</a>
<a href="#map">Global Map</a>
<a href="#sector">Sector</a>
<a href="#chat">AI</a>

</div>

</nav>

<section class="hero">

<h1>ZENTRA Economic OS</h1>

<p>

Global AI powered economic intelligence platform

</p>

</section>

<section id="search" class="section">

<h2>Economic Search</h2>

<div class="card">

<input id="searchInput" placeholder="Search economy">

<button onclick="search()">Search</button>

<div id="searchResult" class="result"></div>

</div>

</section>

<section id="brain" class="section">

<h2>Economic Brain</h2>

<div class="card">

<div class="metric" id="riskScore"></div>

<div id="state"></div>

</div>

</section>

<section id="map" class="section">

<h2>Global Risk Map</h2>

<div class="card">

<canvas id="riskChart"></canvas>

</div>

</section>

<section id="sector" class="section">

<h2>Sector Intelligence</h2>

<div class="card">

<select id="sectorSelect">

<option value="agriculture">Agriculture</option>
<option value="technology">Technology</option>
<option value="retail">Retail</option>
<option value="construction">Construction</option>
<option value="finance">Finance</option>

</select>

<input id="demand" placeholder="Demand index (0-100)">
<input id="costPressure" placeholder="Cost pressure (0-100)">
<input id="financePressure" placeholder="Finance pressure (0-100)">

<button onclick="sector()">Analyze</button>

<div id="sectorResult" class="result"></div>

</div>

</section>

<section id="chat" class="section">

<h2>AI Advisor</h2>

<div class="card">

<textarea id="chatInput" placeholder="Ask economic question"></textarea>

<button onclick="ask()">Ask</button>

<div id="chatResult" class="result"></div>

</div>

</section>

<footer>

ZENTRA Economic OS

</footer>

<script>

const API="https://zentra-core-api.onrender.com"

async function loadBrain(){

let r=await fetch(API+"/brain")
let data=await r.json()

document.getElementById("riskScore").innerText="Risk Index: "+data.global_risk_index
document.getElementById("state").innerText=data.economic_state

}

async function ask(){

let q=document.getElementById("chatInput").value

let r=await fetch(API+"/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:q})

})

let data=await r.json()

document.getElementById("chatResult").innerText=data.answer

}

async function sector(){

let s=document.getElementById("sectorSelect").value
let d=parseFloat(document.getElementById("demand").value)
let c=parseFloat(document.getElementById("costPressure").value)
let f=parseFloat(document.getElementById("financePressure").value)

let r=await fetch(API+"/sector-intelligence",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

sector:s,
demand:d,
cost_pressure:c,
finance_pressure:f

})

})

let data=await r.json()

document.getElementById("sectorResult").innerText=

"Risk Score:"+data.sector_risk_score+
" Band:"+data.band

}

function search(){

let q=document.getElementById("searchInput").value.toLowerCase()

let answer=""

if(q.includes("gold"))
answer="Gold often rises during inflation."

else if(q.includes("economy"))
answer="Economy depends on inflation, interest and liquidity."

else
answer="ZENTRA analyzing economic context."

document.getElementById("searchResult").innerText=answer

}

function loadMap(){

const ctx=document.getElementById('riskChart')

new Chart(ctx,{
type:'bar',
data:{
labels:["US","Germany","China","India","Turkey","Brazil"],
datasets:[{
label:"Risk Score",
data:[44,36,48,52,68,56],
backgroundColor:"#00e0ff"
}]
}
})

}

loadBrain()
loadMap()

</script>

</body>
</html>
