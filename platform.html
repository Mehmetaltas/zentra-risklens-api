<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Platform</title><style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#08101d;
  color:#ecf3ff;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:24px;
}
.card{
  background:#0f1728;
  border:1px solid #1f2d48;
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.btn{
  display:inline-block;
  padding:12px 16px;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  text-decoration:none;
  margin-right:10px;
}
.mini{
  background:#111c31;
  border:1px solid #1f2d48;
  border-radius:12px;
  padding:14px;
}
.muted{color:#9db0d1}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style></head><body><div class="wrap">  <div class="card">
    <h1>ZENTRA Platform</h1>
    <p class="muted">Global Economic AI Operating System</p><div style="margin-top:12px">
  <a href="/zentra-main.html" class="btn">Main System</a>
  <a href="/trade-intelligence.html" class="btn">Trade Intelligence</a>
  <a href="/trade-action.html" class="btn">Trade Action</a>
</div>

  </div>  <div class="grid"><div class="card">
  <h2>System Status</h2>
  <div id="statusBox">Loading...</div>
</div>

<div class="card">
  <h2>AI Decision Snapshot</h2>
  <div id="aiBox">Loading...</div>
</div>

  </div></div><script type="module">

const statusBox = document.getElementById("statusBox");
const aiBox = document.getElementById("aiBox");

// 🔥 İlk kontrol
statusBox.innerHTML = `<div class="mini">SCRIPT STARTED</div>`;

import("./core-system/systemOrchestrator.js?v=20")
.then((mod)=>{

  const r = mod.runZentraFlow();

  // STATUS
  statusBox.innerHTML = `
    <div class="mini">
      System: <b>ACTIVE</b><br>
      Risk Score: <b>${r.security.score}</b><br>
      Profit: <b>${r.trade.profit}</b><br>
      Logistics: <b>${r.logistics.mode}</b>
    </div>
  `;

  const ai = r.aiDecision;
  const pred = r.predictiveTrade;
  const risk = r.riskForecast;

  const color =
    ai.recommendation === "EXECUTE" ? "#22c55e" :
    ai.recommendation === "REVIEW" ? "#f59e0b" :
    "#ef4444";

  // AI PANEL
  aiBox.innerHTML = `
    <div class="mini">
      <h3 style="color:${color}">${ai.recommendation}</h3>
      Score: <b>${ai.aiDecisionScore}</b><br>
      Confidence: <b>${ai.confidence}</b>
    </div>

    <div class="mini">
      <h3>Predictive</h3>
      Trend: <b>${pred.nextTrend}</b><br>
      Signal: <b>${pred.predictiveSignal}</b>
    </div>

    <div class="mini">
      <h3>Risk</h3>
      Level: <b>${risk.riskForecastLevel}</b><br>
      Score: <b>${risk.riskForecastScore}</b>
    </div>
  `;

  // 🔥 AUTO EXECUTION
  if(ai.recommendation === "EXECUTE"){
    statusBox.innerHTML += `
      <div class="mini" style="margin-top:10px;border:1px solid #22c55e">
        <b style="color:#22c55e">AUTO EXECUTION STARTED</b><br>
        Trade ID: ${r.trade.tradeId}<br>
        Profit: ${r.trade.profit}<br>
        Payment: ${r.payment.amount} ${r.payment.currency}
      </div>
    `;
  }

})
.catch((err)=>{
  console.error(err);

  statusBox.innerHTML = `
    <div class="mini" style="border:1px solid #ef4444">
      <b style="color:#ef4444">IMPORT ERROR</b><br>
      ${err.message}
    </div>
  `;

  aiBox.innerHTML = `
    <div class="mini" style="border:1px solid #ef4444">
      AI LOAD FAILED
    </div>
  `;
});

</script></body>
</html>
