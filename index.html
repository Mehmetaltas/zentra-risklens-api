<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ZENTRA Economic OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#061021;
font-family:Arial;
color:white;
margin:0;
}

nav{
background:#08142c;
padding:16px 30px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #123b6b;
}

.logo{
color:#00e0ff;
font-weight:bold;
font-size:18px;
}

nav a{
color:#7bdfff;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:54px;
color:#00e0ff;
}

.hero p{
max-width:700px;
margin:auto;
font-size:20px;
color:#8fb7d8;
}

.section{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.card{
background:#0b1d3b;
padding:25px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #123b6b;
}

.metric{
font-size:30px;
color:#00e0ff;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#08132a;
color:white;
}

button{
padding:12px 20px;
background:#00e0ff;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.result{
background:#020814;
padding:20px;
margin-top:10px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

footer{
text-align:center;
padding:30px;
background:#08142c;
}

</style>

</head>

<body>

<nav>

<div class="logo">ZENTRA</div>

<div>

<a href="#brain">Brain</a>
<a href="#map">Map</a>
<a href="#chart">Charts</a>
<a href="#sector">Sector</a>
<a href="#chat">AI</a>

</div>

</nav>

<section class="hero">

<h1>ZENTRA Economic OS</h1>

<p>

Global Economic Intelligence Platform

</p>

</section>

<section id="brain" class="section">

<h2>Global Economic Brain</h2>

<div class="grid">

<div class="card">

<div>Global Risk Index</div>

<div id="risk" class="metric">--</div>

</div>

<div class="card">

<div>Economic State</div>

<div id="state" class="metric">--</div>

</div>

<div class="card">

<div>Market Trend</div>

<div id="trend" class="metric">--</div>

</div>

</div>

</section>

<section id="chart" class="section">

<h2>Economic Indicators</h2>

<div class="card">

<canvas id="chart"></canvas>

</div>

</section>

<section id="map" class="section">

<h2>Global Risk Map</h2>

<div class="card">

<canvas id="mapChart"></canvas>

</div>

</section>

<section id="sector" class="section">

<h2>Sector Intelligence</h2>

<div class="card">

<select id="sector">

<option value="agriculture">Agriculture</option>
<option value="technology">Technology</option>
<option value="retail">Retail</option>
<option value="construction">Construction</option>

</select>

<input id="demand" placeholder="Demand index (0-100)">

<input id="cost" placeholder="Cost pressure (0-100)">

<input id="finance" placeholder="Finance pressure (0-100)">

<button onclick="sector()">Analyze</button>

<div id="sectorResult" class="result"></div>

</div>

</section>

<section id="chat" class="section">

<h2>AI Economic Advisor</h2>

<div class="card">

<textarea id="question" placeholder="Ask anything about economy"></textarea>

<button onclick="ask()">Ask</button>

<div id="answer" class="result"></div>

</div>

</section>

<footer>

ZENTRA Economic OS

</footer>

<script>

const API="https://zentra-core-api.onrender.com"

async function loadBrain(){

try{

let r=await fetch(API+"/brain")
let data=await r.json()

document.getElementById("risk").innerText=data.global_risk_index
document.getElementById("state").innerText=data.economic_state
document.getElementById("trend").innerText=data.market_trend

}catch{

document.getElementById("risk").innerText="57"
document.getElementById("state").innerText="moderate pressure"
document.getElementById("trend").innerText="neutral"

}

}

async function ask(){

let q=document.getElementById("question").value

let r=await fetch(API+"/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:q})

})

let data=await r.json()

document.getElementById("answer").innerText=data.answer

}

async function sector(){

let sector=document.getElementById("sector").value
let demand=document.getElementById("demand").value
let cost=document.getElementById("cost").value
let finance=document.getElementById("finance").value

let r=await fetch(API+"/sector-intelligence",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

sector:sector,
demand:demand,
cost_pressure:cost,
finance_pressure:finance

})

})

let data=await r.json()

document.getElementById("sectorResult").innerText=

"Risk Score:"+data.sector_risk_score

}

function chart(){

new Chart(

document.getElementById("chart"),

{

type:"line",

data:{

labels:["Jan","Feb","Mar","Apr","May","Jun"],

datasets:[

{

label:"Inflation",

data:[3,4,5,6,5,4],

borderColor:"#00e0ff"

},

{

label:"Interest",

data:[4,4,4.5,5,5.5,6],

borderColor:"#ff9f40"

}

]

}

}

)

}

function map(){

new Chart(

document.getElementById("mapChart"),

{

type:"bar",

data:{

labels:["US","Germany","China","India","Turkey"],

datasets:[{

label:"Risk",

data:[42,36,48,52,69],

backgroundColor:"#00e0ff"

}]

}

}

)

}

chart()

map()

loadBrain()

</script>

</body>
</html>
