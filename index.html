<section class="card">

<h2>Live Risk Simulation</h2>

<p>
ZENTRA continuously evaluates behavioral financial signals
and updates systemic risk indicators in real time.
</p>

<div class="grid">

<div class="metric">
<strong id="riskScore">0</strong>
Behavioral Risk
</div>

<div class="metric">
<strong id="stressScore">0</strong>
Stress Pressure
</div>

<div class="metric">
<strong id="fraudScore">0</strong>
Fraud Signal
</div>

<div class="metric">
<strong id="macroScore">0</strong>
Macro Risk
</div>

</div>

</section>


<script>

function randomScore(min,max){
return Math.floor(Math.random()*(max-min)+min)
}

function updateRisk(){

document.getElementById("riskScore").innerText =
randomScore(55,85)

document.getElementById("stressScore").innerText =
randomScore(40,70)

document.getElementById("fraudScore").innerText =
randomScore(20,60)

document.getElementById("macroScore").innerText =
randomScore(30,65)

}

updateRisk()

setInterval(updateRisk,5000)

  </script>
