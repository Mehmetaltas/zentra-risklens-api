<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZENTRA Main System</title>

<style>
body{margin:0;font-family:Arial;background:#050b14;color:#fff}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#0b1622;border:1px solid #1f3a56;border-radius:14px;padding:16px;margin-bottom:16px}
.metric{margin:8px 0}
.value{font-size:24px;font-weight:bold}
.debug{background:#2a1220;color:#ffb3c1;padding:10px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>

<div class="wrap">

<h1>ZENTRA Main System</h1>

<div id="debug" class="debug" style="display:none"></div>

<div class="card">
<div class="metric">Data Source: <span id="dataSource">--</span></div>
<div class="metric">Risk Score: <span id="score">--</span></div>
<div class="metric">Risk Level: <span id="level">--</span></div>
<div class="metric">Driver: <span id="driver">--</span></div>
</div>

<div class="card">
<h3>Markets</h3>
Oil: <span id="oil">--</span><br>
Gold: <span id="gold">--</span><br>
SP500: <span id="sp500">--</span><br>
Interest: <span id="interest">--</span><br>
Shipping: <span id="shipping">--</span>
</div>

<div class="card">
<h3>Signals</h3>
<div id="signals"></div>
</div>

</div>

<script type="module">
import { runBrain } from "./engines/brainEngine.js";

function showError(msg){
  const box = document.getElementById("debug");
  box.style.display = "block";
  box.innerText = msg;
}

async function start(){

  try{
    const brain = await runBrain();

    if(!brain){
      throw new Error("Brain returned empty");
    }

    document.getElementById("dataSource").textContent = brain.source || "unknown";

    document.getElementById("score").textContent = brain.riskScore;
    document.getElementById("level").textContent = brain.riskLevel;
    document.getElementById("driver").textContent = brain.driver;

    document.getElementById("oil").textContent = brain.markets?.oil;
    document.getElementById("gold").textContent = brain.markets?.gold;
    document.getElementById("sp500").textContent = brain.markets?.sp500;
    document.getElementById("interest").textContent = brain.markets?.interestRate;
    document.getElementById("shipping").textContent = brain.markets?.shipping;

    const signalsBox = document.getElementById("signals");
    signalsBox.innerHTML = "";

    (brain.signals || []).forEach(s=>{
      const div = document.createElement("div");
      div.innerText = s.title + " (" + s.severity + ")";
      signalsBox.appendChild(div);
    });

  }catch(e){
    console.error(e);
    showError("ENGINE ERROR → " + e.message);
  }

}

start();
</script>

</body>
</html>
