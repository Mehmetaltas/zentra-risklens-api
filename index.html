<section class="card">

<h2>Global Financial Heatmap</h2>

<p>
ZENTRA observes global financial stress signals and systemic risk intensity.
</p>

<div id="heatmap" style="height:420px;border-radius:12px;"></div>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

var heatMap = L.map('heatmap').setView([20,10],2)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:5}
).addTo(heatMap)


var riskPoints = [

[40.71,-74.00,0.6],  // New York
[51.50,-0.12,0.5],   // London
[50.11,8.68,0.4],    // Frankfurt
[41.01,28.97,0.7],   // Istanbul
[35.68,139.69,0.3],  // Tokyo
[1.29,103.85,0.4],   // Singapore
[-33.86,151.20,0.2], // Sydney
[19.43,-99.13,0.5],  // Mexico
[55.75,37.61,0.6],   // Moscow
[28.61,77.20,0.6]    // India
]

L.heatLayer(riskPoints,{
radius:40,
blur:30
}).addTo(heatMap)

</script>

</section>
