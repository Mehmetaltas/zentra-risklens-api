<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Test</title>
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#06101f;
  color:#fff;
}
.wrap{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}
.box{
  background:#0b1730;
  border:1px solid rgba(77,140,223,.22);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}
h1{color:#49ddff}
pre{
  white-space:pre-wrap;
  line-height:1.6;
  margin:0;
}
.ok{color:#49ddff;font-weight:bold}
.err{color:#ff6b6b;font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
  <h1>ZENTRA API TEST</h1>

  <div class="box">
    <div>Connection:</div>
    <div id="status">Loading...</div>
  </div>

  <div class="box">
    <div>Risk Score:</div>
    <div id="riskScore">--</div>
  </div>

  <div class="box">
    <div>State:</div>
    <div id="state">--</div>
  </div>

  <div class="box">
    <div>Trend:</div>
    <div id="trend">--</div>
  </div>

  <div class="box">
    <div>Brain:</div>
    <pre id="brainResult">Loading...</pre>
  </div>

  <div class="box">
    <div>Raw JSON:</div>
    <pre id="rawJson">Loading...</pre>
  </div>
</div>

<script>
window.onload = async function () {
  const API = "https://zentra-risklens-api.vercel.app/api/zentra";

  const statusEl = document.getElementById("status");
  const riskEl = document.getElementById("riskScore");
  const stateEl = document.getElementById("state");
  const trendEl = document.getElementById("trend");
  const brainEl = document.getElementById("brainResult");
  const rawEl = document.getElementById("rawJson");

  try {
    statusEl.innerHTML = "Connecting to API...";

    const res = await fetch(API, { cache: "no-store" });
    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const data = await res.json();

    statusEl.innerHTML = '<span class="ok">API CONNECTED</span>';
    riskEl.textContent = data?.brain?.risk ?? "--";
    stateEl.textContent = data?.brain?.state ?? "--";
    trendEl.textContent = data?.brain?.trend ?? "--";

    brainEl.textContent =
      "Risk: " + (data?.brain?.risk ?? "--") +
      "\nState: " + (data?.brain?.state ?? "--") +
      "\nTrend: " + (data?.brain?.trend ?? "--") +
      "\nAdvice: " + (data?.brain?.advice ?? "--");

    rawEl.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    statusEl.innerHTML = '<span class="err">API ERROR</span>';
    brainEl.textContent = "Error: " + err.message;
    rawEl.textContent = "Fetch failed.";
    console.error(err);
  }
};
</script>
</body>
</html>
