<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZENTRA Private Access</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
background:#38bdf8;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>ZENTRA Private Layer</h2>

<input id="pass" type="password" placeholder="Password">

<button onclick="check()">Enter</button>

<p id="msg"></p>

</div>

<script>

function check(){

let p=document.getElementById("pass").value

if(p==="ZentraCore"){

window.location.href="risklens/dashboard.html"

}else{

document.getElementById("msg").innerText="Wrong password"

}

}

</script>

</body>
</html>
