}

header h1{
margin:0;

nav{

}

}

.container{
max-width:1000px;

}

.searchbox{

}

.searchbox h2{

}

input{

}

}

<nav>

<div class="container">

<div class="searchbox">

<h2>Ask ZENTRA</h2>

<p>Ask any economic, financial or business question.</p>

<input id="question" placeholder="Example: Should I buy gold now?">

<button onclick="search()">Analyze</button>

<div class="answer" id="answer">

</div>

</div>

<footer>

ZENTRA Economic OS • Knowledge Engine

</footer>

<script>

function search(){

const q=document.getElementById("question").value

const a=document.getElementById("answer")

a.innerHTML="Analyzing economic context..."

setTimeout(function(){

a.innerHTML="Economic analysis for: <b>"+q+"</b><br><br>"

+"Market conditions, inflation pressure, and global liquidity should be considered before making financial decisions."

+"<br><br>Recommendation: diversify assets and avoid concentrated risk."

},1200)

}

</script>
