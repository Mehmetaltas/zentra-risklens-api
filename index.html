<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZENTRA Economic Intelligence</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>
:root{
  --bg:#050814;
  --panel:#081020;
  --panel2:#0d152e;
  --line:#1d2b55;
  --text:#ffffff;
  --muted:#9db0d8;
  --cyan:#00d4ff;
  --green:#19e68c;
  --yellow:#f5b942;
  --orange:#ff8a3d;
  --red:#ff4d6d;
}
*{box-sizing:border-box;min-width:0}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  overflow-x:hidden;
}
nav{
  background:var(--panel);
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  flex-wrap:wrap;
  gap:16px;
  position:sticky;
  top:0;
  z-index:10;
}
nav a{
  color:white;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:var(--cyan)}
section{
  padding:36px 16px;
  border-bottom:1px solid var(--line);
}
.container{
  max-width:1250px;
  margin:0 auto;
}
h1{
  margin:0 0 10px 0;
  font-size:clamp(30px,4vw,42px);
}
h2{
  margin:0 0 14px 0;
  color:var(--cyan);
  font-size:clamp(22px,3vw,30px);
}
.lead{
  color:var(--muted);
  line-height:1.75;
  max-width:900px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:16px;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px;
}
.col-3{grid-column:span 3}
.col-4{grid-column:span 4}
.col-5{grid-column:span 5}
.col-6{grid-column:span 6}
.col-7{grid-column:span 7}
.col-12{grid-column:span 12}
.metric-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--muted);
  margin-bottom:8px;
}
.metric{
  font-size:clamp(24px,4vw,34px);
  color:var(--cyan);
  font-weight:700;
}
.panel{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
}
textarea, input, select{
  width:100%;
  background:var(--panel2);
  border:1px solid var(--line);
  color:white;
  padding:12px;
  border-radius:10px;
}
button{
  padding:11px 16px;
  background:var(--cyan);
  color:#00131c;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}
button.secondary{
  background:#162445;
  color:#d7e5ff;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.answer{
  margin-top:12px;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  min-height:180px;
  white-space:pre-wrap;
  line-height:1.7;
}
.pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px
