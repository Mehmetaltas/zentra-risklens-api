<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRA Economic OS</title>

<style>
body{margin:0;font-family:Arial;background:#071021;color:white}
nav{background:#08132a;padding:16px;display:flex;justify-content:space-between}
.logo{color:#00e0ff;font-weight:bold}
.hero{text-align:center;padding:70px 20px}
.hero h1{font-size:52px;color:#00e0ff}
.section{max-width:1100px;margin:auto;padding:30px 20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{background:#0e1c38;padding:20px;border-radius:12px}
.metric{font-size:30px;color:#00e0ff}
textarea{width:100%;padding:12px;margin-top:10px;background:#08132a;color:white;border:none;border-radius:10px}
button{padding:12px 16px;background:#00e0ff;border:none;border-radius:10px;margin-top:10px}
.chatbox{background:#020814;padding:16px;border-radius:10px;min-height:150px}
</style>
</head>

<body>

<nav>
<div class="logo">ZENTRA</div>
<div>Economic Operating System</div>
</nav>

<section class="hero">
<h1>ZENTRA Economic OS</h1>
<p>Global economic intelligence platform.</p>
</section>

<section class="section">

<h2>Global Dashboard</h2>

<div class="grid">

<div class="card">
<div>Global Risk Index</div>
<div id="risk" class="metric">--</div>
</div>

<div class="card">
<div>Economic State</div>
<div id="state" class="metric">--</div>
</div>

<div class="card">
<div>Market Trend</div>
<div id="trend" class="metric">--</div>
</div>

</div>

</section>

<section class="section">

<h2>AI Advisor</h2>

<div class="card">

<div id="chatbox" class="chatbox"></div>

<textarea id="chatinput" placeholder="Ask an economic question..."></textarea>

<button onclick="ask()">Send</button>

</div>

</section>

<script>

function loadDashboard(){

let inflation=55
let rate=50
let volatility=60

let risk=Math.round((inflation*0.5)+(rate*0.3)+(volatility*0.2))

document.getElementById("risk").innerText=risk

if(risk>70){
document.getElementById("state").innerText="High Pressure"
document.getElementById("trend").innerText="Bearish"
}
else if(risk>45){
document.getElementById("state").innerText="Moderate"
document.getElementById("trend").innerText="Neutral"
}
else{
document.getElementById("state").innerText="Stable"
document.getElementById("trend").innerText="Bullish"
}

}

function ask(){

let q=document.getElementById("chatinput").value.toLowerCase()

let a="Economic conditions are stable."

if(q.includes("inflation")||q.includes("enflasyon")){
a="Inflation reduces purchasing power and increases cost pressure."
}

if(q.includes("gold")||q.includes("altın")){
a="Gold is often used as a hedge during inflation and uncertainty."
}

if(q.includes("business")||q.includes("iş")){
a="Healthy businesses require stable demand, margin discipline and controlled debt."
}

let box=document.getElementById("chatbox")

box.innerHTML+=`<div><b>You:</b> ${q}</div>`
box.innerHTML+=`<div><b>ZENTRA:</b> ${a}</div>`

document.getElementById("chatinput").value=""

}

loadDashboard()

</script>

</body>
</html>
