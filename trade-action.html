<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA Trade Action</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08101d;
      color:#ecf3ff;
    }
    .wrap{
      max-width:1000px;
      margin:auto;
      padding:24px;
    }
    .card{
      background:#0f1728;
      border:1px solid #1f2d48;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    h1,h2,h3,p{margin-top:0}
    .muted{color:#9db0d1}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .full{
      grid-column:1 / -1;
    }
    input,select,textarea{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #263655;
      background:#0b1527;
      color:#ecf3ff;
      font:inherit;
      box-sizing:border-box;
    }
    textarea{min-height:110px}
    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-weight:700;
      margin-right:10px;
    }
    .btn-primary{
      background:#3b82f6;
      color:#fff;
    }
    .btn-secondary{
      background:#13203a;
      color:#ecf3ff;
      border:1px solid #243554;
    }
    .result{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }
    .mini{
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:14px;
      padding:14px;
    }
    @media (max-width:800px){
      .grid,.result{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ZENTRA Trade Action</h1>
      <p class="muted">Formu doldur, trade action simülasyonunu çalıştır.</p>
    </div>

    <div class="card">
      <form id="tradeForm">
        <div class="grid">
          <div class="field">
            <label>Company Name</label>
            <input id="companyName" value="Corporate Buyer B" />
          </div>

          <div class="field">
            <label>Contact Email</label>
            <input id="contactEmail" value="team@buyer.com" />
          </div>

          <div class="field">
            <label>Product</label>
            <input id="productName" value="Steel" />
          </div>

          <div class="field">
            <label>Volume</label>
            <input id="volume" type="number" value="100" />
          </div>

          <div class="field">
            <label>Buy Price</label>
            <input id="buyPrice" type="number" value="1000" />
          </div>

          <div class="field">
            <label>Sell Price</label>
            <input id="sellPrice" type="number" value="1200" />
          </div>

          <div class="field full">
            <label>Request Details</label>
            <textarea id="details">Steel procurement for EU region with secure payment and shipping planning.</textarea>
          </div>
        </div>

        <div style="margin-top:16px">
          <button type="submit" class="btn btn-primary">Submit Trade Action</button>
          <button type="button" id="clearBtn" class="btn btn-secondary">Clear Result</button>
        </div>
      </form>

      <p id="status" class="muted" style="margin-top:16px">Status: Waiting for submission...</p>
    </div>

    <div id="output" class="result"></div>
  </div>

  <script type="module">
    import { createTrade } from "./core-system/trade/tradeEngine.js";
    import { calculateCost } from "./core-system/trade/costEngine.js";
    import { buildOffer } from "./core-system/trade/offerBuilder.js";
    import { initiatePayment } from "./core-system/payment/paymentEngine.js";
    import { createEscrow } from "./core-system/payment/escrowEngine.js";
    import { createMilestones } from "./core-system/payment/milestoneEngine.js";
    import { planLogistics } from "./core-system/logistics/logisticsEngine.js";
    import { generateContract } from "./core-system/contracts/contractEngine.js";
    import { createInsurance } from "./core-system/insurance/insuranceEngine.js";
    import { matchPartners } from "./core-system/network/networkEngine.js";
    import { runSecurityCheck } from "./core-system/security/securityEngine.js";

    const form = document.getElementById("tradeForm");
    const statusEl = document.getElementById("status");
    const output = document.getElementById("output");
    const clearBtn = document.getElementById("clearBtn");

    function card(title, body){
      return `
        <div class="mini">
          <h3>${title}</h3>
          <div class="muted">${body}</div>
        </div>
      `;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      try {
        statusEl.textContent = "Status: Running trade action...";

        const trade = createTrade({
          product: document.getElementById("productName").value,
          buyPrice: Number(document.getElementById("buyPrice").value),
          sellPrice: Number(document.getElementById("sellPrice").value),
          volume: Number(document.getElementById("volume").value)
        });

        const cost = calculateCost(trade);
        const offer = buildOffer(trade, cost);
        const payment = initiatePayment(trade);
        const escrow = createEscrow(payment);
        const milestones = createMilestones();
        const logistics = planLogistics(trade);
        const contract = generateContract(trade);
        const insurance = createInsurance(trade);
        const network = matchPartners();
        const security = runSecurityCheck();

        output.innerHTML = `
          ${card("Trade", `
            Product: <b>${trade.product}</b><br>
            Buy: <b>${trade.buyPrice}</b><br>
            Sell: <b>${trade.sellPrice}</b><br>
            Volume: <b>${trade.volume}</b><br>
            Profit: <b>${trade.profit}</b>
          `)}
          ${card("Cost + Offer", `
            Total Cost: <b>${cost.totalCost}</b><br>
            Sell Value: <b>${offer.sellValue}</b><br>
            Net Profit: <b>${offer.netProfit}</b>
          `)}
          ${card("Payment + Escrow", `
            Amount: <b>${payment.amount}</b><br>
            Currency: <b>${payment.currency}</b><br>
            Method: <b>${payment.method}</b><br>
            Escrow: <b>${escrow.status}</b>
          `)}
          ${card("Milestones", milestones.map(m => `${m.step}: <b>${m.status}</b>`).join("<br>"))}
          ${card("Logistics", `
            Mode: <b>${logistics.mode}</b><br>
            Days: <b>${logistics.estimatedDays}</b><br>
            Cost: <b>${logistics.cost}</b>
          `)}
          ${card("Contract + Insurance", `
            Contract: <b>${contract.contractId}</b><br>
            Policy: <b>${insurance.policyId}</b><br>
            Insured Value: <b>${insurance.insuredValue}</b>
          `)}
          ${card("Network", `
            Supplier: <b>${network.supplier}</b><br>
            Buyer: <b>${network.buyer}</b><br>
            Broker: <b>${network.broker}</b>
          `)}
          ${card("Security", `
            Fraud Risk: <b>${security.fraudRisk}</b><br>
            Compliance: <b>${security.compliance}</b><br>
            Score: <b>${security.score}</b>
          `)}
        `;

        statusEl.textContent = "Status: Trade action completed successfully.";
      } catch (err) {
        statusEl.textContent = "Status: Trade action error.";
        output.innerHTML = `<div class="mini" style="color:#fecaca">${err.message}</div>`;
        console.error(err);
      }
    });

    clearBtn.addEventListener("click", () => {
      output.innerHTML = "";
      statusEl.textContent = "Status: Waiting for submission...";
    });
  </script>
</body>
</html>
