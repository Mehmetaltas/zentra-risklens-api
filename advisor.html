<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ZENTRA AI Advisor</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
font-size:32px;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:8px;
border:none;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.block{
margin-bottom:15px;
}

.label{
font-weight:bold;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>ZENTRA AI Advisor</h1>

<p>Ask any economic or financial question.</p>

<textarea id="question" placeholder="Example: Is gold a good investment now?"></textarea>

<br>

<button onclick="askAI()">Ask ZENTRA</button>

<div id="result" class="result" style="display:none">

<div class="block">
<span class="label">Mode:</span>
<span id="mode"></span>
</div>

<div class="block">
<span class="label">Risk Score:</span>
<span id="risk"></span>
</div>

<div class="block">
<span class="label">Global Risk:</span>
<span id="global"></span>
</div>

<div class="block">
<span class="label">Economic State:</span>
<span id="state"></span>
</div>

<div class="block">
<span class="label">Market Trend:</span>
<span id="market"></span>
</div>

<div class="block">
<span class="label">Analysis:</span>
<p id="analysis"></p>
</div>

<div class="block">
<span class="label">Recommendation:</span>
<p id="prescription"></p>
</div>

</div>

</div>

<script>

const API = "https://zentra-core-api.onrender.com/advisor"

async function askAI(){

let q = document.getElementById("question").value

if(q.length < 3){
alert("Please write a question")
return
}

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:q
})
})

let data = await res.json()

document.getElementById("result").style.display="block"

document.getElementById("mode").innerText = data.mode
document.getElementById("risk").innerText = data.risk_score
document.getElementById("global").innerText = data.global_risk_index
document.getElementById("state").innerText = data.economic_state
document.getElementById("market").innerText = data.market_trend
document.getElementById("analysis").innerText = data.analysis
document.getElementById("prescription").innerText = data.prescription

}

</script>

</body>
</html>
