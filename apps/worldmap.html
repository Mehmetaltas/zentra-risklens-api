<!doctype html>
<html>
<head>
<title>ZENTRA Global Risk Map</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
body{
background:#050814;
color:white;
font-family:Arial;
margin:0;
}
.container{
max-width:1200px;
margin:auto;
padding:30px;
}
h1{
color:#00d4ff;
}
</style>
</head>

<body>

<div class="container">
<h1>Global Financial Risk Map</h1>
<canvas id="worldChart"></canvas>
</div>

<script>
async function loadMap(){

const world = await fetch("https://unpkg.com/world-atlas@2/countries-110m.json")
.then(r=>r.json())

const countries = ChartGeo.topojson.feature(world, world.objects.countries).features

const data = countries.map(c=>({
feature:c,
value:Math.random()*100
}))

const ctx = document.getElementById("worldChart")

new Chart(ctx,{
type:"choropleth",
data:{
labels:countries.map(d=>d.properties.name),
datasets:[{
label:"Risk",
data:data
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
projection:{axis:"x",projection:"equalEarth"},
color:{axis:"x",quantize:5}
}
}
})
}

loadMap()
</script>

</body>
</html>
