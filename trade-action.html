<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZENTRA Trade Action</title>

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08101d;
      color:#ecf3ff;
    }
    .wrap{
      max-width:1000px;
      margin:auto;
      padding:24px;
    }
    .card{
      background:#0f1728;
      border:1px solid #1f2d48;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    .muted{color:#9db0d1}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .full{grid-column:1/-1}
    input,textarea{
      padding:10px;
      border-radius:10px;
      border:1px solid #263655;
      background:#0b1527;
      color:#ecf3ff;
    }
    textarea{min-height:100px}
    .btn{
      padding:12px 16px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-weight:700;
      margin-right:10px;
    }
    .btn-primary{background:#3b82f6;color:white}
    .btn-secondary{background:#13203a;color:white}
    .result{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }
    .mini{
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:14px;
      padding:12px;
    }
    @media(max-width:800px){
      .grid,.result{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h1>ZENTRA Trade Action</h1>
    <p class="muted">Trade simülasyonu çalıştır.</p>
  </div>

  <div class="card">
    <form id="tradeForm">
      <div class="grid">

        <div class="field">
          <label>Product</label>
          <input id="product" value="Steel">
        </div>

        <div class="field">
          <label>Volume</label>
          <input id="volume" type="number" value="100">
        </div>

        <div class="field">
          <label>Buy Price</label>
          <input id="buy" type="number" value="1000">
        </div>

        <div class="field">
          <label>Sell Price</label>
          <input id="sell" type="number" value="1200">
        </div>

        <div class="field full">
          <label>Details</label>
          <textarea>Steel procurement EU</textarea>
        </div>

      </div>

      <div style="margin-top:14px">
        <button type="submit" class="btn btn-primary">Run</button>
        <button type="button" id="clearBtn" class="btn btn-secondary">Clear</button>
      </div>
    </form>

    <p id="status" class="muted">Status: Waiting...</p>
  </div>

  <div id="output" class="result"></div>

</div>

<script type="module">
import { runZentraFlow } from "./core-system/systemOrchestrator.js";

const form = document.getElementById("tradeForm");
const statusEl = document.getElementById("status");
const output = document.getElementById("output");
const clearBtn = document.getElementById("clearBtn");

statusEl.textContent = "Status: Script loaded.";

function card(title, body){
  return `
    <div class="mini">
      <h3>${title}</h3>
      <div class="muted">${body}</div>
    </div>
  `;
}

form.onsubmit = function(e){
  e.preventDefault();

  try{
    statusEl.textContent = "Running...";

    const result = runZentraFlow();

    output.innerHTML = `
      ${card("Trade", `
        Product: <b>${result.trade.product}</b><br>
        Profit: <b>${result.trade.profit}</b>
      `)}

      ${card("Offer", `
        Sell: <b>${result.offer.sellValue}</b><br>
        Net: <b>${result.offer.netProfit}</b>
      `)}

      ${card("Payment", `
        Amount: <b>${result.payment.amount}</b><br>
        Escrow: <b>${result.escrow.status}</b>
      `)}

      ${card("Logistics", `
        Mode: <b>${result.logistics.mode}</b><br>
        Days: <b>${result.logistics.estimatedDays}</b>
      `)}

      ${card("Security", `
        Risk: <b>${result.security.fraudRisk}</b><br>
        Score: <b>${result.security.score}</b>
      `)}
    `;

    statusEl.textContent = "Done ✅";

  }catch(err){
    console.error(err);
    statusEl.textContent = "ERROR ❌";
    output.innerHTML = err.message;
  }
};

clearBtn.onclick = ()=>{
  output.innerHTML="";
  statusEl.textContent="Status: Waiting...";
};
</script>

</body>
</html>
