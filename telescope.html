<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZENTRA Global Telescope</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#050814;
color:#eaf2ff;
font-family:Arial;
}

nav{
background:#060b1c;
padding:14px;
border-bottom:1px solid #1e2a55;
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:#0c1228;
border:1px solid #1e2a55;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

h1{
color:#00d4ff;
}

h2{
color:#19e68c;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.metric{
font-size:26px;
color:#00d4ff;
margin-top:10px;
}

.map{
height:260px;
background:#07101f;
border:1px solid #1e2a55;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#99a6c6;
}

.ai{
background:#07101f;
padding:14px;
border-radius:10px;
border:1px solid #1e2a55;
}

</style>

</head>

<body>

<nav>

<a href="index.html">Home</a>

<a href="platform.html">Platform</a>

<a href="architecture.html">Architecture</a>

<a href="telescope.html">Telescope</a>

<a href="investor.html">Investor</a>

</nav>

<div class="container">

<div class="card">

<h1>GLOBAL ECONOMIC DASHBOARD</h1>

<p>ZENTRA Financial Telescope observing global economic behavior.</p>

</div>

<div class="grid">

<div class="card">

<h2>Global Risk Index</h2>

<div id="riskScore" class="metric">--</div>

<canvas id="riskChart"></canvas>

</div>

<div class="card">

<h2>Market Signals</h2>

<p>BTC Price</p>

<div id="btc" class="metric">--</div>

<p>Market Trend</p>

<div id="trend">--</div>

</div>

</div>

<div class="card">

<h2>World Risk Map</h2>

<div class="map">

Global Risk Visualization

</div>

</div>

<div class="card">

<h2>AI Economic Insight</h2>

<div id="ai" class="ai">

Loading AI analysis...

</div>

</div>

</div>

<script>

async function loadRisk(){

try{

const r = await fetch("https://zentra-risklens-api-2.onrender.com/telescope")

const data = await r.json()

document.getElementById("riskScore").innerText = data.risk_score

document.getElementById("btc").innerText = data.market.btc_price

document.getElementById("trend").innerText = data.market.market_trend

document.getElementById("ai").innerText =
data.ai_reason + " — " + data.ai_advice

}catch(e){

document.getElementById("ai").innerText =
"API connection error."

}

}

loadRisk()

const ctx = document.getElementById("riskChart")

new Chart(ctx,{
type:"line",
data:{
labels:["1","2","3","4","5","6","7"],
datasets:[{
label:"Risk Trend",
data:[52,55,58,61,63,65,67],
borderColor:"#00d4ff"
}]
}
})

</script>

</body>
</html>
