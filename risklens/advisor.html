<!doctype html>

<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RiskLens Economic Advisor</title><style>

*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#030712;
--panel:#081120;
--line:#163052;
--text:#eef6ff;
--muted:#9bb3d9;
--cyan:#00d4ff;
--green:#19e68c;
--yellow:#f5b942;
--orange:#ff8a3d;
--red:#ff4d6d;
}

body{
font-family:Arial;
color:var(--text);
background:
radial-gradient(circle at 20% 20%, rgba(0,212,255,.10), transparent 25%),
linear-gradient(180deg,#030712,#07111f 50%,#040914);
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
background:#060d1c;
border-bottom:1px solid var(--line);
}

.brand{
color:var(--cyan);
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.hero h1{
color:var(--cyan);
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:var(--muted);
margin-bottom:30px;
line-height:1.7;
}

.inputbox{
background:var(--panel);
border:1px solid var(--line);
border-radius:16px;
padding:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--line);
background:#030712;
color:white;
margin-bottom:14px;
font-size:15px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:var(--cyan);
color:#02111d;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:30px;
background:var(--panel);
border:1px solid var(--line);
border-radius:16px;
padding:20px;
line-height:1.7;
}

.label{
color:var(--muted);
font-size:13px;
margin-bottom:6px;
}

.value{
font-size:18px;
margin-bottom:10px;
}

</style></head><body><div class="topbar">
<div class="brand">RiskLens Advisor</div>
</div><div class="container"><div class="hero">
<h1>Economic AI Advisor</h1>
<p>
Ask an economic or market question.  
RiskLens will interpret signals and provide a lens-based response.
</p>
</div><div class="inputbox"><input id="question" placeholder="Ask about inflation, markets, sectors, oil, logistics..."><button onclick="analyze()">Analyze</button>

</div><div class="result" id="result"><div class="label">AI Output</div>
<div class="value">Waiting for question...</div></div></div><script>

function analyze(){

const q = document.getElementById("question").value.toLowerCase()

let answer = "No clear signal detected."

if(q.includes("inflation")){
answer = "Inflation risk increasing globally. Central banks likely to maintain tighter policy."
}

else if(q.includes("oil")){
answer = "Oil price pressure indicates logistics and transport cost escalation."
}

else if(q.includes("interest")){
answer = "Interest rate environment suggests tighter credit and slower growth."
}

else if(q.includes("market")){
answer = "Markets currently sensitive to macro signals and liquidity tightening."
}

else if(q.includes("recession")){
answer = "Recession probability rising if credit stress continues."
}

document.getElementById("result").innerHTML =
"<div class='label'>Economic Lens Output</div><div class='value'>"+answer+"</div>"

}

</script></body>
  </html>
