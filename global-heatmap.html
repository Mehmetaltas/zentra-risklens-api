<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRA Global Risk Heatmap</title>

<style>

body{
background:#050814;
color:white;
font-family:Arial;
margin:0;
}

nav{
background:#081020;
padding:14px;
border-bottom:1px solid #1d2b55;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

#map{
width:100%;
height:650px;
background:#081020;
border-radius:12px;
border:1px solid #1d2b55;
}

.panel{
margin-top:20px;
background:#081020;
padding:20px;
border-radius:12px;
border:1px solid #1d2b55;
}

.low{color:#19e68c}
.medium{color:#f5b942}
.high{color:#ff8a3d}
.critical{color:#ff4d6d}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

</head>

<body>

<nav>

<a href="index.html">Home</a>
<a href="advisor.html">Advisor</a>
<a href="global-map.html">World Map</a>
<a href="economic-radar.html">Radar</a>
<a href="platform-page.html">Platform</a>

</nav>

<div class="container">

<h1>ZENTRA Global Risk Heatmap</h1>

<canvas id="map"></canvas>

<div class="panel">

<h3>Country Risk Info</h3>

<div id="info">
Click a country to see economic risk details
</div>

</div>

</div>

<script>

const API="https://zentra-risklens-api.42mehmetaltas.workers.dev"

let riskData={}

async function loadRisk(){

try{

let r=await fetch(API+"/global-risk")
let d=await r.json()

d.countries.forEach(c=>{
riskData[c.code]=c
})

}catch{

riskData={
US:{risk:42,band:"low"},
CN:{risk:39,band:"low"},
TR:{risk:69,band:"high"},
RU:{risk:63,band:"high"},
BR:{risk:55,band:"medium"},
IN:{risk:45,band:"medium"},
EU:{risk:40,band:"low"}
}

}

drawMap()

}

async function drawMap(){

const world=await fetch(
"https://unpkg.com/world-atlas/countries-110m.json"
).then(r=>r.json())

const countries=ChartGeo.topojson.feature(
world,
world.objects.countries
).features

const data=countries.map(d=>{

let code=d.id

let risk=riskData[code]?.risk || 40

return{

feature:d,
value:risk

}

})

const ctx=document.getElementById("map")

new Chart(ctx,{

type:"choropleth",

data:{
labels:countries.map(d=>d.properties.name),
datasets:[{

data:data

}]
},

options:{
plugins:{legend:{display:false}},
scales:{
projection:{
axis:"x",
projection:"equalEarth"
},
color:{
axis:"x",
quantize:5,
legend:{position:"bottom"}
}
}
}

})

}

loadRisk()

</script>

</body>
</html>
