<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA Main</title>
  <meta name="description" content="ZENTRA Global Economic AI Operating System" />
  <style>
    :root {
      --bg: #08101d;
      --panel: #0f1728;
      --panel-2: #111c31;
      --line: #1f2d48;
      --text: #ecf3ff;
      --muted: #9db0d1;
      --blue: #3b82f6;
      --blue-2: #60a5fa;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --max: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(96,165,250,0.10), transparent 24%),
        linear-gradient(180deg, #07101d 0%, #091223 100%);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(12px);
      background: rgba(8, 16, 29, 0.78);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-inner {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .brand-text h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.08em;
    }

    .brand-text p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--muted);
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .nav a:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .hero {
      padding: 52px 0 30px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .hero-main,
    .hero-side,
    .panel,
    .card {
      background: linear-gradient(180deg, rgba(15,23,40,0.98), rgba(10,17,30,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 32px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(96,165,250,0.28);
      background: rgba(59,130,246,0.08);
      border-radius: 999px;
      color: #cfe2ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero h2 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.02;
      letter-spacing: -0.03em
      }

    .hero p.lead {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      max-width: 760px;
    }
