<section class="card">

<h2>Global Risk Map</h2>

<p>
ZENTRA Financial Telescope monitors systemic financial signals
across major markets.
</p>

<div id="map" style="height:400px;border-radius:12px;"></div>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([25,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:5
}).addTo(map);


var markets = [

{city:"New York",risk:"Medium",lat:40.71,lng:-74.00},
{city:"London",risk:"Medium",lat:51.50,lng:-0.12},
{city:"Frankfurt",risk:"Low",lat:50.11,lng:8.68},
{city:"Istanbul",risk:"Rising",lat:41.01,lng:28.97},
{city:"Singapore",risk:"Stable",lat:1.29,lng:103.85}

];


markets.forEach(function(m){

L.marker([m.lat,m.lng])
.addTo(map)
.bindPopup("<b>"+m.city+"</b><br>Risk: "+m.risk)

})

</script>

</section>
