<section class="card">

<h2>System Status</h2>

<p>
Live operational status of ZENTRA financial infrastructure components.
</p>

<div class="grid">

<div class="metric">
<strong id="risklensStatus">ONLINE</strong>
RiskLens API
</div>

<div class="metric">

</div>

<script>

function updateStatus(){

const states = ["ONLINE","ACTIVE","RUNNING"]

document.getElementById("risklensStatus").innerText =

document.getElementById("stressStatus").innerText =
states[Math.floor(Math.random()*states.length)]

document.getElementById("macroStatus").innerText =
states[Math.floor(Math.random()*states.length)]

document.getElementById("securityStatus").innerText =
states[Math.floor(Math.random()*states.length)]

}

updateStatus()

setInterval(updateStatus,6000)

</script>
