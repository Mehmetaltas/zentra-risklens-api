<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZENTRA Command Center</title>

<style>

body{
background:#050c18;
color:#eaf2ff;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.title{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
color:#9fb4cc;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#0f1d30;
border:1px solid #243f63;
border-radius:12px;
padding:20px;
}

.label{
font-size:13px;
color:#9fb4cc;
margin-bottom:8px;
}

.value{
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
ZENTRA Command Center
</div>

<div class="subtitle">
Global risk / signals / markets / strategic command view
</div>

<div class="grid">

<div class="card">
<div class="label">Global Risk Score</div>
<div class="value" id="globalRiskScore">--</div>
</div>

<div class="card">
<div class="label">Risk Level</div>
<div class="value" id="riskLevel">--</div>
</div>

<div class="card">
<div class="label">Dominant Driver</div>
<div class="value" id="driver">--</div>
</div>

<div class="card">
<div class="label">System Status</div>
<div class="value">Operational</div>
</div>

</div>

</div>

<script type="module">

import { runBrain } from "./engines/brainEngine.js"

const brain = runBrain()

console.log("ZENTRA BRAIN", brain)

document.getElementById("globalRiskScore").textContent = brain.riskScore
document.getElementById("riskLevel").textContent = brain.riskLevel.toUpperCase()
document.getElementById("driver").textContent = brain.driver

</script>

</body>
</html>
