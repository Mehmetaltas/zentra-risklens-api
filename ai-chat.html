<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ZENTRA AI Advisor</title>

<style>

body{
font-family:Arial;
background:#0a0f1c;
color:white;
margin:0;
}

nav{
background:#111827;
padding:15px;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.chatbox{
background:#111827;
padding:20px;
border-radius:10px;
height:400px;
overflow:auto;
margin-bottom:20px;
}

.message{
margin-bottom:15px;
}

.user{
color:#60a5fa;
}

.ai{
color:#34d399;
}

input{
width:75%;
padding:12px;
border:none;
border-radius:6px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>
<body>

<nav>

<a href="index.html">Home</a>
<a href="platform.html">Platform</a>
<a href="advisor.html">Advisor</a>
<a href="ai-chat.html">AI Chat</a>
<a href="trust.html">Trust</a>

</nav>

<div class="container">

<h1>ZENTRA AI</h1>
<p>Global Economic Intelligence Assistant</p>

<div id="chatbox" class="chatbox"></div>

<input id="question" placeholder="Ask anything about economy, business or life...">

<button onclick="send()">Send</button>

</div>

<script>

const API = "https://zentra-core-api.onrender.com/chat"

async function send(){

let q = document.getElementById("question").value

if(!q) return

let box = document.getElementById("chatbox")

box.innerHTML += `<div class="message user">You: ${q}</div>`

document.getElementById("question").value=""

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:q})
})

let data = await res.json()

box.innerHTML += `<div class="message ai">ZENTRA: ${data.answer}</div>`

box.scrollTop = box.scrollHeight

}

</script>

</body>
</html>
