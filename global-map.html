<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ZENTRA Global Risk Map</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<style>

body{
background:#050814;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
color:#00d4ff;
}

#map{
width:95%;
height:80vh;
margin:auto;
}

</style>

</head>

<body>

<h1>ZENTRA Global Risk Map</h1>

<div id="map"></div>

<script>

const API = "https://zentra-risklens-api.42mehmetaltas.workers.dev/global-risk"

async function loadMap(){

const res = await fetch(API)
const data = await res.json()

const countries = data.countries

const locations = countries.map(c=>c.code)
const values = countries.map(c=>c.risk)
const names = countries.map(c=>c.name)

const map = [{
type:"choropleth",
locationmode:"ISO-3",
locations:locations,
z:values,
text:names,
colorscale:"RdYlGn_r",
colorbar:{
title:"Risk"
}
}]

const layout = {
geo:{
bgcolor:"#050814",
showframe:false,
showcoastlines:true,
coastlinecolor:"#444"
},
paper_bgcolor:"#050814",
font:{color:"white"}
}

Plotly.newPlot("map",map,layout)

}

loadMap()

</script>

</body>
</html>
