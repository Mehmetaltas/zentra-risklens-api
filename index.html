<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ZENTRA Global Economic OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#06101f;
color:#fff;
}

nav{
background:#08132a;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #123;
}

.logo{
color:#49ddff;
font-weight:bold;
font-size:18px;
}

nav a{
color:#9bdcff;
text-decoration:none;
margin-left:12px;
font-size:14px;
}

.lang{
cursor:pointer;
background:#49ddff;
color:#000;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:42px;
color:#49ddff;
}

.small{
color:#9ab6d9;
font-size:14px;
}

.section{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#0b1730;
padding:20px;
border-radius:14px;
border:1px solid rgba(77,140,223,.22);
}

.metric{
font-size:28px;
color:#49ddff;
font-weight:bold;
}

.result{
background:#020814;
padding:16px;
border-radius:12px;
margin-top:10px;
white-space:pre-wrap;
}

canvas{
margin-top:10px;
}

.footer{
text-align:center;
padding:30px;
background:#08132a;
margin-top:60px;
font-size:14px;
color:#6fa9d6;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
}

</style>

</head>


<body>


<nav>

<div class="logo">ZENTRA</div>

<div>

<a href="#dashboard" data-tr="Dashboard">Dashboard</a>
<a href="#brain" data-tr="Brain">Brain</a>
<a href="#economic" data-tr="Economic">Economic</a>
<a href="#sectors" data-tr="Sectors">Sectors</a>
<a href="#scenario" data-tr="Scenario">Scenario</a>
<a href="#trade" data-tr="Trade">Trade</a>
<a href="#career" data-tr="Career">Career</a>
<a href="#opportunity" data-tr="Opportunities">Opportunities</a>

<span class="lang" onclick="setLang('en')">EN</span>
<span class="lang" onclick="setLang('tr')">TR</span>

</div>

</nav>


<section class="hero">

<h1 id="title">ZENTRA Global Economic OS</h1>

<p class="small" id="subtitle">
Economic Intelligence Platform
</p>

</section>


<div class="container">


<section id="dashboard" class="section">

<h2 data-tr="Global Dashboard">Global Dashboard</h2>

<div class="grid">

<div class="card">
<div class="small">Risk Score</div>
<div id="riskScore" class="metric">--</div>
</div>

<div class="card">
<div class="small">Economic State</div>
<div id="state" class="metric">--</div>
</div>

<div class="card">
<div class="small">Market Trend</div>
<div id="trend" class="metric">--</div>
</div>

</div>

</section>



<section id="brain" class="section">

<h2 data-tr="Economic Brain">Economic Brain</h2>

<div class="card">

<div id="brainResult" class="result">

Loading...

</div>

</div>

</section>



<section id="sectors" class="section">

<h2 data-tr="Sector Intelligence">Sector Intelligence</h2>

<div class="card">

<canvas id="riskChart"></canvas>

</div>

</section>


</div>


<div class="footer">

ZENTRA — Global Economic Operating System

</div>


<script>


const API_URL="https://zentra-risklens-api.vercel.app/api/zentra"


async function loadData(){

try{

const res=await fetch(API_URL)

const data=await res.json()

document.getElementById("riskScore").innerText=data.brain.risk
document.getElementById("state").innerText=data.brain.state
document.getElementById("trend").innerText=data.brain.trend


document.getElementById("brainResult").innerText=

`Risk: ${data.brain.risk}
State: ${data.brain.state}
Trend: ${data.brain.trend}
Advice: ${data.brain.advice}`


renderChart(data)

}catch(e){

console.log("API error")

}

}



function renderChart(data){

const ctx=document.getElementById("riskChart")

new Chart(ctx,{

type:"bar",

data:{

labels:data.sectors.map(s=>s.sector),

datasets:[{

label:"Sector Risk",

data:data.sectors.map(s=>s.risk),

backgroundColor:"#49ddff"

}]

}

})

}



function setLang(lang){

if(lang==="tr"){

title.innerText="ZENTRA Küresel Ekonomik Sistem"

subtitle.innerText="Ekonomik Zeka Platformu"

}

if(lang==="en"){

title.innerText="ZENTRA Global Economic OS"

subtitle.innerText="Economic Intelligence Platform"

}

}


loadData()

</script>


</body>

</html>
