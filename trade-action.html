<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA Trade Action</title>
  <style>
    html{display:none}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08101d;
      color:#ecf3ff;
    }
    .wrap{
      max-width:1100px;
      margin:auto;
      padding:24px;
    }
    .card{
      background:#0f1728;
      border:1px solid #1f2d48;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .full{
      grid-column:1 / -1;
    }
    .mini{
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:12px;
      padding:14px;
    }
    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border:0;
      cursor:pointer;
      font-weight:700;
      margin-right:10px;
      margin-top:10px;
    }
    .btn2{
      background:#13203a;
      border:1px solid #243554;
    }
    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #263655;
      background:#0b1527;
      color:#ecf3ff;
      box-sizing:border-box;
    }
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:#111c31;
      border:1px solid #1f2d48;
      border-radius:12px;
      padding:14px;
      overflow:auto;
    }
    .muted{color:#9db0d1}
    @media(max-width:800px){
      .grid{grid-template-columns:1fr}
    }
  </style>
  <script>
    (function () {
      const API_BASE = "https://zentra-v2-rrgj.vercel.app/api";
      const token = localStorage.getItem("zentra_token");

      async function checkAuth() {
        if (!token) {
          window.location.href = "/platform.html";
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/me`, {
            method: "GET",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });

          const data = await response.json();

          if (!response.ok || !data || data.status !== "AUTHORIZED") {
            localStorage.removeItem("zentra_token");
            window.location.href = "/platform.html";
            return;
          }

          document.documentElement.style.display = "block";
        } catch (error) {
          localStorage.removeItem("zentra_token");
          window.location.href = "/platform.html";
        }
      }

      checkAuth();
    })();

    function logoutZentra(){
      localStorage.removeItem("zentra_token");
      window.location.href = "/platform.html";
    }
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Trade Action</h1>
      <p class="muted">Protected Execution Layer</p>
      <a href="/platform.html" class="btn btn2">Platform</a>
      <a href="/zentra-main.html" class="btn">Main</a>
      <a href="/trade-intelligence.html" class="btn">Trade Intelligence</a>
      <button class="btn btn2" onclick="logoutZentra()">Logout</button>
    </div>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label>Product</label>
          <input id="product" value="Steel" />
        </div>

        <div class="field">
          <label>Buy Price</label>
          <input id="buy_price" type="number" value="1000" />
        </div>

        <div class="field">
          <label>Sell Price</label>
          <input id="sell_price" type="number" value="1200" />
        </div>

        <div class="field">
          <label>Volume</label>
          <input id="volume" type="number" value="100" />
        </div>

        <div class="field full">
          <button class="btn" onclick="createTrade()">Create Trade</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div id="status" class="muted">Ready</div>
    </div>

    <div class="card">
      <h2>Output</h2>
      <pre id="output">Waiting...</pre>
    </div>
  </div>

  <script>
    const API_BASE = "https://zentra-v2-rrgj.vercel.app/api";
    const token = localStorage.getItem("zentra_token") || "";

    function setStatus(text){
      document.getElementById("status").textContent = text;
    }

    function setOutput(data){
      document.getElementById("output").textContent =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function createTrade(){
      try{
        setStatus("Trade create gönderiliyor...");

        const response = await fetch(`${API_BASE}/trade-create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            product: document.getElementById("product").value,
            buy_price: Number(document.getElementById("buy_price").value),
            sell_price: Number(document.getElementById("sell_price").value),
            volume: Number(document.getElementById("volume").value)
          })
        });

        const data = await response.json();
        setStatus(`Trade create tamamlandı (${response.status})`);
        setOutput(data);
      }catch(err){
        setStatus("Trade create hata");
        setOutput(err.message);
      }
    }
  </script>
</body>
</html>
