<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENTRA PRO — Economic Operating System</title>
  <meta name="description" content="ZENTRA PRO — AI powered global economic operating system." />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

  <style>
    /* =========================
       ROOT / GLOBAL
    ========================= */
    :root{
      --bg:#06101f;
      --bg2:#09162c;
      --panel:rgba(13,25,53,.80);
      --panel2:#0b1730;
      --panel3:#071120;
      --line:rgba(77,140,223,.20);
      --text:#eef5ff;
      --muted:#9ab6d9;
      --cyan:#49ddff;
      --blue:#5b8cff;
      --green:#54f2a1;
      --amber:#ffd166;
      --red:#ff6b6b;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:22px;
      --max:1280px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(73,221,255,.10), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(91,140,255,.12), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(84,242,161,.08), transparent 34%),
        linear-gradient(180deg,#040b16 0%, #071021 35%, #08142a 100%);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}

    .grid-bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-2;
      background-image:
        linear-gradient(rgba(82,134,212,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,134,212,.08) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, rgba(255,255,255,.28), transparent 85%);
    }

    .container{
      max-width:var(--max);
      margin:0 auto;
      padding:0 18px;
    }

    /* =========================
       NAVBAR
    ========================= */
    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(14px);
      background:rgba(6,13,27,.66);
      border-bottom:1px solid rgba(92,129,190,.18);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:.08em;
      white-space:nowrap;
    }

    .brand-mark{
      width:38px;
      height:38px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 10px 30px rgba(73,221,255,.25);
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }

    .brand-mark::before,.brand-mark::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,.22);
    }

    .brand-mark::before{width:36px;height:36px;left:16px;top:-10px}
    .brand-mark::after{width:18px;height:18px;left:8px;top:17px}

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav a{
      padding:10px 12px;
      border-radius:12px;
      color:#bfe2ff;
      font-size:13px;
      transition:.25s ease;
    }

    .nav a:hover{
      background:rgba(73,221,255,.08);
      color:#fff;
    }

    .lang{
      border:1px solid var(--line);
      background:rgba(14,24,48,.86);
      color:#fff;
      border-radius:12px;
      padding:10px 12px;
      outline:none;
    }

    /* =========================
       HERO
    ========================= */
    .hero{
      min-height:88vh;
      display:grid;
      grid-template-columns:1.08fr .92fr;
      align-items:center;
      gap:26px;
      padding:42px 0 48px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border:1px solid rgba(73,221,255,.18);
      border-radius:999px;
      color:#bdeeff;
      background:rgba(73,221,255,.06);
      font-size:12px;
      margin-bottom:18px;
    }

    .hero h1{
      font-size:58px;
      line-height:1.02;
      margin:0 0 18px;
      letter-spacing:-.04em;
    }

    .gradient-text{
      background:linear-gradient(90deg,#f7fbff 0%, #78efff 50%, #8fa9ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero p{
      color:var(--muted);
      font-size:17px;
      line-height:1.8;
      max-width:720px;
      margin:0 0 24px;
    }

    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    /* =========================
       BUTTONS
    ========================= */
    .btn{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font-weight:700;
      transition:.25s ease;
    }

    .btn-primary{
      color:#05101b;
      background:linear-gradient(90deg,var(--cyan),#7df0ff);
      box-shadow:0 10px 28px rgba(73,221,255,.20);
    }

    .btn-secondary{
      color:#d7eeff;
      background:rgba(15,26,51,.85);
      border:1px solid var(--line);
    }

    .btn:hover{transform:translateY(-2px)}

    .btn-small{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      font-weight:700;
      font-size:13px;
      background:linear-gradient(135deg,#00e0ff,#3aa8ff);
      color:#031019;
      transition:all .25s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-top:12px;
    }

    .btn-small:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(0,224,255,.25);
    }

    .btn-outline{
      border:1px solid var(--line);
      background:#0d1e3e;
      color:#d8f1ff;
      border-radius:14px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
      margin-top:12px;
    }

    .btn-outline:hover{
      background:#12305f;
    }

    /* =========================
       HERO METRICS / VISUAL
    ========================= */
    .hero-metrics{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .metric-card{
      background:rgba(12,23,46,.78);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .metric-card .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .metric-card .value{
      font-size:24px;
      color:var(--cyan);
      font-weight:800;
      word-break:break-word;
    }

    .hero-visual{
      position:relative;
      min-height:560px;
      display:flex;
      align-items:center;
      justify-content:center;
      perspective:1200px;
    }

    .orbital{
      width:min(520px,100%);
      aspect-ratio:1/1;
      position:relative;
      transform-style:preserve-3d;
      animation:tiltCard 9s ease-in-out infinite;
    }

    @keyframes tiltCard{
      0%,100%{transform:rotateX(7deg) rotateY(-8deg)}
      50%{transform:rotateX(-4deg) rotateY(8deg)}
    }

    .ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:1px solid rgba(91,140,255,.22);
      box-shadow:inset 0 0 30px rgba(91,140,255,.06);
    }

    .ring.r1{transform:scale(.95)}
    .ring.r2{transform:scale(.72) rotateX(68deg)}
    .ring.r3{transform:scale(.64) rotateY(70deg)}
    .ring.r4{transform:scale(.40)}

    .core{
      position:absolute;
      inset:50% auto auto 50%;
      width:130px;
      height:130px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #b9f7ff, var(--cyan) 35%, var(--blue) 80%);
      box-shadow:0 0 80px rgba(73,221,255,.38), 0 0 130px rgba(91,140,255,.18);
    }

    .float-card{
      position:absolute;
      width:220px;
      background:linear-gradient(180deg, rgba(17,30,59,.96), rgba(10,19,38,.92));
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .float-card h4{
      margin:0 0 8px;
      color:var(--cyan);
      font-size:14px;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .float-card p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .fc-1{left:-10px;top:30px}
    .fc-2{right:-8px;top:78px}
    .fc-3{left:20px;bottom:60px}
    .fc-4{right:18px;bottom:30px}

    /* =========================
       SECTIONS / GRID / CARDS
    ========================= */
    .section{
      padding:42px 0;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .section-head h2{
      margin:0;
      font-size:32px;
      letter-spacing:-.03em;
    }

    .section-head p{
      margin:0;
      color:var(--muted);
      max-width:760px;
      line-height:1.7;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      padding:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .grid-4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
    }

    .stat-card,.mini-card,.feature-card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }

    .stat-label,.mini-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.07em;
      margin-bottom:8px;
    }

    .stat-value{
      font-size:30px;
      color:var(--cyan);
      font-weight:800;
      word-break:break-word;
    }

    .mini-value{
      font-size:24px;
      color:var(--cyan);
      font-weight:800;
      word-break:break-word;
    }

    .feature-card h3{
      margin:0 0 8px;
      color:#fff;
      font-size:20px;
    }

    .feature-card p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    /* =========================
       MAP
    ========================= */
    .map-wrap{
      width:100%;
      overflow:hidden;
      border-radius:22px;
      border:1px solid var(--line);
      background:#050d1a;
    }

    #worldMap{
      display:block;
      width:100% !important;
      max-width:100%;
      height:500px !important;
    }

    /* =========================
       FORMS / RESULTS / CHAT
    ========================= */
    .result{
      margin-top:12px;
      background:#08101f;
      border:1px solid rgba(77,140,223,.16);
      padding:16px;
      border-radius:18px
      /* =========================
FORMS / RESULTS / CHAT
========================= */

.result{
margin-top:12px;
background:#08101f;
border:1px solid rgba(77,140,223,.16);
padding:16px;
border-radius:18px;
line-height:1.7;
color:#dcecff;
white-space:pre-wrap;
}

/* CHAT */

.chatbox{
margin-top:12px;
background:#08101f;
border:1px solid rgba(77,140,223,.16);
padding:16px;
border-radius:18px;
min-height:220px;
max-height:380px;
overflow:auto;
line-height:1.7;
color:#dcecff;
}

/* INPUT */

.field{
width:100%;
background:#0a1630;
color:#fff;
border:1px solid rgba(77,140,223,.18);
border-radius:16px;
padding:14px;
outline:none;
margin-top:12px;
}

/* BUTTONS */

.btn-small{
border:none;
cursor:pointer;
border-radius:14px;
padding:12px 14px;
font-weight:700;
font-size:13px;
background:linear-gradient(135deg,#00e0ff,#3aa8ff);
color:#031019;
transition:.25s;
}

.btn-small:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,224,255,.25);
}

.btn-outline{
border:1px solid rgba(77,140,223,.25);
background:#0d1e3e;
color:#d8f1ff;
border-radius:14px;
padding:12px 14px;
cursor:pointer;
}

.btn-outline:hover{
background:#00e0ff;
color:#031019;
}

/* RESPONSIVE */

@media(max-width:950px){

.grid{
grid-template-columns:1fr;
}

.hero{
padding:50px 20px;
}

.hero h1{
font-size:34px;
}

#worldMap{
height:320px!important;
}

}
